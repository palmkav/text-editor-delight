  /* ── Helper: draw photo background onto any canvas context (cover-fit) ── */
  async function _drawPhotoBgToCtx(ctx, pw, ph) {
    const bgStyle = document.getElementById('photoBg').style.backgroundImage;
    if (!bgStyle || bgStyle === 'none' || !bgStyle.trim()) return;
    const match = bgStyle.match(/url\(["']?([^"')]+)["']?\)/);
    if (!match) return;
    await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.max(pw / img.naturalWidth, ph / img.naturalHeight);
        const sw = img.naturalWidth * scale, sh = img.naturalHeight * scale;
        ctx.drawImage(img, (pw - sw) / 2, (ph - sh) / 2, sw, sh);
        resolve();
      };
      img.onerror = resolve;
      img.src = match[1];
    });
  }

  /* ── Helper: composite bgLayer chip canvases onto a 2D ctx ── */
  function _compositeChips(ctx, page) {
    const pageRect = page.getBoundingClientRect();
    if (animMode === 'off') {
      // Single full-page canvas
      const cv = document.querySelector('#bgLayer canvas');
      if (cv) {
        const pw = page.offsetWidth, ph = page.offsetHeight;
        ctx.drawImage(cv, 0, 0, pw, ph);
      }
    } else {
      // Per-chip wrapper divs with CSS animation
      document.querySelectorAll('#bgLayer > div').forEach(wrapper => {
        const wStyle   = getComputedStyle(wrapper);
        const opacity  = parseFloat(wStyle.opacity);
        if (opacity <= 0.01) return;
        const wRect    = wrapper.getBoundingClientRect();
        const wx = wRect.left - pageRect.left;
        const wy = wRect.top  - pageRect.top;
        const ww = wRect.width, wh = wRect.height;

        // Chip canvas
        const mc = wrapper.querySelector('canvas');
        if (mc) {
          ctx.save();
          ctx.globalAlpha = opacity;
          // Handle clip-path (typing reveal animation)
          const clipPath = wStyle.clipPath;
          if (clipPath && clipPath !== 'none') {
            const m = clipPath.match(/inset\(([^)]+)\)/);
            if (m) {
              const parts    = m[1].trim().split(/\s+/);
              const rightVal = parts[1] || '0px';
              let   rightPx  = rightVal.endsWith('%')
                ? parseFloat(rightVal) / 100 * ww
                : parseFloat(rightVal) || 0;
              ctx.beginPath();
              ctx.rect(wx, wy, Math.max(0, ww - rightPx), wh);
              ctx.clip();
            }
          }
          ctx.drawImage(mc, wx, wy, ww, wh);
          ctx.restore();
        }

        // Sparkle particle dots
        wrapper.querySelectorAll('div').forEach(p => {
          const ps      = getComputedStyle(p);
          const pOpacity = parseFloat(ps.opacity);
          if (pOpacity <= 0.01) return;
          const pRect   = p.getBoundingClientRect();
          const px = pRect.left - pageRect.left + pRect.width  / 2;
          const py = pRect.top  - pageRect.top  + pRect.height / 2;
          ctx.save();
          ctx.globalAlpha  = pOpacity;
          ctx.fillStyle    = ps.backgroundColor;
          ctx.beginPath();
          ctx.arc(px, py, pRect.width / 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      });
    }
  }

  /* ── Save as PNG image — 4K output (Save button) ── */
  async function saveAsImage() {
    const page     = document.getElementById('page');
    const pw       = page.offsetWidth;
    const ph       = page.offsetHeight;
    const transpBg = document.getElementById('transparentBgToggle')?.checked;

    // Target 4K: scale up to whichever multiplier fills ~3840px on the longest side
    const TARGET_PX = 3840;
    const scale4k   = Math.max(Math.ceil(TARGET_PX / Math.max(pw, ph)), devicePixelRatio, 2);

    const out  = document.createElement('canvas');
    out.width  = pw * scale4k;
    out.height = ph * scale4k;
    const ctx  = out.getContext('2d');
    ctx.scale(scale4k, scale4k);

    // Rounded-corner clip (matches .page border-radius: 16px)
    const rad = 16;
    ctx.beginPath();
    ctx.moveTo(rad, 0);
    ctx.lineTo(pw - rad, 0); ctx.quadraticCurveTo(pw, 0,  pw, rad);
    ctx.lineTo(pw, ph - rad); ctx.quadraticCurveTo(pw, ph, pw - rad, ph);
    ctx.lineTo(rad, ph);      ctx.quadraticCurveTo(0,  ph, 0,  ph - rad);
    ctx.lineTo(0, rad);       ctx.quadraticCurveTo(0,  0,  rad, 0);
    ctx.closePath();
    ctx.clip();

    // White base (skip if transparent export)
    if (!transpBg) { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, pw, ph); }
    // Photo background
    await _drawPhotoBgToCtx(ctx, pw, ph);

    // Chip text layer — re-render directly at 4K so text/shapes are vector-sharp.
    // exportCtx is pre-scaled by scale4k, so all canvas drawing commands
    // (text, shapes, fills) naturally produce crisp 4K output.
    const _rawText  = document.getElementById('bgInput').value.trim();
    const _fontSize = parseInt(document.getElementById('bgSize').value);
    if (_rawText) {
      if (mode !== 'overlay' && chipStyle !== 'postit') {
        // Main chip path: re-render from scratch at full resolution
        await renderChips(_rawText, 0.92, _fontSize, ctx);
      } else {
        // Overlay/post-it: composite existing screen canvases (bitmap upscale fallback)
        _compositeChips(ctx, page);
      }
    }

    out.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = 'text-design.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }, 'image/png');
  }

  /* ── Save as Video (MP4 via WebCodecs, or WebM fallback) ── */
  async function saveAsVideo() {
    const page = document.getElementById('page');
    const pw   = page.offsetWidth;
    const ph   = page.offsetHeight;
    const FPS  = 30;
    // H.264 requires even dimensions
    const encW = pw % 2 === 0 ? pw : pw + 1;
    const encH = ph % 2 === 0 ? ph : ph + 1;

    const saveBtn   = document.getElementById('saveBtn');
    const origLabel = saveBtn.textContent;
    const _restore  = (err) => {
      saveBtn.textContent = origLabel;
      saveBtn.disabled    = false;
      if (err) { console.error('[saveAsVideo]', err); alert('Video export failed: ' + (err?.message || String(err))); }
    };

    saveBtn.textContent = '⏺ Loading…';
    saveBtn.disabled    = true;

    // ══════════════════════════════════════════════════════════
    // PHASE 1: Load all async resources BEFORE touching animations
    // ══════════════════════════════════════════════════════════

    // 1a. Photo background
    let photoBgImg = null;
    const bgStyleStr = document.getElementById('photoBg').style.backgroundImage;
    if (bgStyleStr && bgStyleStr !== 'none') {
      const m = bgStyleStr.match(/url\(["']?([^"')]+)["']?\)/);
      if (m) photoBgImg = await new Promise(r => {
        const img = new Image();
        img.onload = () => r(img); img.onerror = () => r(null); img.src = m[1];
      });
    }

    // 1b. mp4-muxer CDN (only if VideoEncoder available)
    let Muxer = null, ArrayBufferTarget = null;
    if (window.VideoEncoder) {
      try {
        const mod = await Promise.race([
          import('https://cdn.jsdelivr.net/npm/mp4-muxer/build/mp4-muxer.mjs'),
          new Promise((_, rej) => setTimeout(() => rej(new Error('CDN timeout after 5s')), 5000)),
        ]);
        ({ Muxer, ArrayBufferTarget } = mod);
      } catch(e) {
        console.warn('[saveAsVideo] mp4-muxer load failed, falling back to MediaRecorder:', e.message);
      }
    }

    // ══════════════════════════════════════════════════════════
    // PHASE 2: Restart animations NOW (all async loading done)
    // ══════════════════════════════════════════════════════════
    saveBtn.textContent = '⏺ Recording…';
    await renderBg();

    // ── Compute total animation duration from freshly created DOM elements ──
    const parseDur = s => {
      if (!s || s === 'none') return 0;
      const v = s.split(',').at(-1).trim();
      return v.endsWith('ms') ? parseFloat(v) : parseFloat(v) * 1000;
    };
    let maxEndMs = 800;
    document.querySelectorAll('#bgLayer > div').forEach(w => {
      const cs = getComputedStyle(w);
      maxEndMs = Math.max(maxEndMs, parseDur(cs.animationDelay) + parseDur(cs.animationDuration));
      w.querySelectorAll('div').forEach(p => {
        const ps = getComputedStyle(p);
        maxEndMs = Math.max(maxEndMs, parseDur(ps.animationDelay) + parseDur(ps.animationDuration));
      });
    });
    const totalDurationMs = maxEndMs + 800; // hold 800 ms on final frame

    // ── Recording canvas ──
    const rec  = document.createElement('canvas');
    rec.width  = encW; rec.height = encH;
    const rCtx = rec.getContext('2d');

    function drawRecFrame() {
      rCtx.fillStyle = '#fff';
      rCtx.fillRect(0, 0, encW, encH);
      if (photoBgImg) {
        const s  = Math.max(encW / photoBgImg.naturalWidth, encH / photoBgImg.naturalHeight);
        const sw = photoBgImg.naturalWidth * s, sh = photoBgImg.naturalHeight * s;
        rCtx.drawImage(photoBgImg, (encW - sw) / 2, (encH - sh) / 2, sw, sh);
      }
      _compositeChips(rCtx, page);
    }

    // ══════════════════════════════════════════════════════════
    // PHASE 3: Record — PATH A: WebCodecs + mp4-muxer → .mp4
    // ══════════════════════════════════════════════════════════
    if (Muxer) {
      // Find a supported H.264 codec string
      const codecCandidates = ['avc1.640028', 'avc1.4D001F', 'avc1.42001F', 'avc1.420034'];
      let chosenCodec = null;
      for (const codec of codecCandidates) {
        try {
          const support = await VideoEncoder.isConfigSupported({
            codec, width: encW, height: encH, bitrate: 3_500_000, framerate: FPS,
          });
          if (support.supported) { chosenCodec = codec; break; }
        } catch(_) {}
      }

      let muxerTarget, muxer, encoder, encErr = null;
      try {
        if (!chosenCodec) throw new Error('H.264 encoding is not supported in this browser. Try Chrome or Edge.');
        muxerTarget = new ArrayBufferTarget();
        muxer = new Muxer({
          target:    muxerTarget,
          video:     { codec: 'avc', width: encW, height: encH },
          fastStart: 'in-memory',
        });
        encoder = new VideoEncoder({
          output: (chunk, meta) => {
            try {
              // Chrome passes decoderConfig.colorSpace = null on the first
              // keyframe chunk, which crashes mp4-muxer when it reads its
              // properties. Strip any null colorSpace before muxing.
              let m = meta ?? {};
              if (m.decoderConfig) {
                m = { ...m, decoderConfig: { ...m.decoderConfig } };
                if (m.decoderConfig.colorSpace == null) delete m.decoderConfig.colorSpace;
              }
              muxer.addVideoChunk(chunk, m);
            } catch(e) { encErr = e; }
          },
          error: e => { encErr = e; },
        });
        encoder.configure({
          codec:     chosenCodec,
          width:     encW,
          height:    encH,
          bitrate:   3_500_000,
          framerate: FPS,
        });
        // Wait one tick for async configure errors to surface
        await new Promise(r => setTimeout(r, 50));
      } catch(e) {
        encErr = e;
      }

      if (!encErr) {
        const startTime = performance.now();
        let frameIdx = 0;

        function encodeNext() {
          if (encErr) { _restore(encErr); return; }

          const elapsed   = performance.now() - startTime;
          const timestamp = Math.round(elapsed * 1000); // µs for VideoFrame

          drawRecFrame();
          try {
            const vf = new VideoFrame(rec, { timestamp, colorSpace: 'srgb' });
            encoder.encode(vf, { keyFrame: frameIdx % (FPS * 2) === 0 });
            vf.close();
          } catch(e) { _restore(e); return; }
          frameIdx++;

          if (elapsed < totalDurationMs) {
            requestAnimationFrame(encodeNext);
          } else {
            encoder.flush()
              .then(() => {
                muxer.finalize();
                const blob = new Blob([muxerTarget.buffer], { type: 'video/mp4' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                a.href = url; a.download = 'text-animation.mp4'; a.click();
                setTimeout(() => URL.revokeObjectURL(url), 5000);
                _restore();
              })
              .catch(e => _restore(e));
          }
        }
        requestAnimationFrame(encodeNext); // start immediately after renderBg
        return;
      }
      console.warn('[saveAsVideo] WebCodecs setup failed, falling back to MediaRecorder:', encErr);
    }

    // ══════════════════════════════════════════════════════════
    // PHASE 3 fallback — PATH B: MediaRecorder → .mp4 or .webm
    // ══════════════════════════════════════════════════════════
    let stream, recorder, chunks = [];
    try {
      stream = rec.captureStream(FPS);
    } catch(e) {
      _restore(e); return;
    }

    const mime = ['video/mp4;codecs=avc1', 'video/mp4', 'video/webm;codecs=vp9', 'video/webm']
      .find(t => { try { return MediaRecorder.isTypeSupported(t); } catch(_) { return false; } }) || '';

    try {
      recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    } catch(e) {
      _restore(e); return;
    }

    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.onerror = e => _restore(e);
    recorder.onstop  = () => {
      if (!chunks.length) { _restore(new Error('No video data was captured')); return; }
      const blob = new Blob(chunks, { type: recorder.mimeType || mime || 'video/webm' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const isMp4 = (recorder.mimeType || mime).startsWith('video/mp4');
      a.href = url; a.download = isMp4 ? 'text-animation.mp4' : 'text-animation.webm';
      a.click(); setTimeout(() => URL.revokeObjectURL(url), 5000);
      _restore();
    };

    recorder.start(100);
    const recStart = performance.now();
    function recLoop() {
      drawRecFrame();
      if (performance.now() - recStart < totalDurationMs) {
        requestAnimationFrame(recLoop);
      } else {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
      }
    }
    requestAnimationFrame(recLoop); // start immediately after renderBg
  }

  const ro = new ResizeObserver(() => renderBg());

  // Rotating default background chip texts
  const BG_TEXT_PRESETS = [

  // ── Photo background + color extraction ──

  function colorDistSq([r1,g1,b1], [r2,g2,b2]) {
    return (r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2;
  }

  // Color helpers for photo palette variants
  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }
  function rgbToHex(r,g,b) {
    return '#' + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');
  }
  function lerpColor(hex, target, t) {
    const [r1,g1,b1] = hexToRgb(hex), [r2,g2,b2] = hexToRgb(target);
    return rgbToHex(r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t);
  }
  function textPairFor(hex) {
    const [r,g,b] = hexToRgb(hex);
    return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? '#1A1A1A' : '#F5F0E8';
  }

  function extractPhotoColors(dataUrl, cb) {
    const img = new Image();
    img.onload = () => {
      const size = 100;
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const data = ctx.getImageData(0, 0, size, size).data;

      // Collect opaque pixels
      const pixels = [];
      for (let i = 0; i < data.length; i += 4) {
        if (data[i+3] < 128) continue;
        pixels.push([data[i], data[i+1], data[i+2]]);
      }
      if (!pixels.length) { cb([]); return; }

      // k-means, k=7
      const k = 5;
      const step = Math.max(1, Math.floor(pixels.length / k));
      let centroids = Array.from({length: k}, (_, i) => [...pixels[Math.min(i * step, pixels.length - 1)]]);

      for (let iter = 0; iter < 10; iter++) {
        const clusters = Array.from({length: k}, () => []);
        for (const px of pixels) {
          let best = 0, bestD = Infinity;
          for (let j = 0; j < k; j++) {
            const d = colorDistSq(px, centroids[j]);
            if (d < bestD) { bestD = d; best = j; }
          }
          clusters[best].push(px);
        }
        centroids = clusters.map((cl, j) => {
          if (!cl.length) return centroids[j];
          const s = cl.reduce((a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]], [0,0,0]);
          return [s[0]/cl.length, s[1]/cl.length, s[2]/cl.length];
        });
      }

      // Sort by cluster size (most dominant first) — re-assign to get sizes
      const sizes = new Array(k).fill(0);
      for (const px of pixels) {
        let best = 0, bestD = Infinity;
        for (let j = 0; j < k; j++) {
          const d = colorDistSq(px, centroids[j]);
          if (d < bestD) { bestD = d; best = j; }
        }
        sizes[best]++;
      }
      const sorted = centroids.map((c, i) => ({c, size: sizes[i]}))
        .sort((a, b) => b.size - a.size)
        .map(({c: [r,g,b]}) => {
          const hex = rgbToHex(r,g,b);
          return { c: hex, pair: textPairFor(hex) };
        });

      cb(sorted);
    };
    img.src = dataUrl;
  }

  function buildPhotoPalette(colors) {
    if (!colors.length) return;

    // colors[0] = most dominant (largest cluster), rest are the other 4
    const [main, ...rest] = colors.slice(0, 5);
    const swatches = [], pal = [];

    // Main color → 3 shades: lighter, original, darker
    // Skip shades if color is near-white or near-black (not useful)
    const [mr, mg, mb] = hexToRgb(main.c);
    const mainLum = (0.299*mr + 0.587*mg + 0.114*mb) / 255;
    const doShades = mainLum > 0.12 && mainLum < 0.88;

    if (doShades) {
      const lighter = lerpColor(main.c, '#FFFFFF', 0.42);
      const darker  = lerpColor(main.c, '#000000', 0.35);
      swatches.push(
        { c: lighter,  pair: textPairFor(lighter), title: 'Photo Light' },
        { c: main.c,   pair: main.pair,            title: 'Photo Main'  },
        { c: darker,   pair: textPairFor(darker),  title: 'Photo Dark'  },
      );
      pal.push(
        [lighter, textPairFor(lighter)], [textPairFor(lighter), lighter],
        [main.c,  main.pair],            [main.pair, main.c],
        [darker,  textPairFor(darker)],  [textPairFor(darker),  darker],
      );
    } else {
      swatches.push({ c: main.c, pair: main.pair, title: 'Photo Main' });
      pal.push([main.c, main.pair], [main.pair, main.c]);
    }

    // Remaining 4 colors — single swatch each
    rest.forEach(({c, pair}, i) => {
      swatches.push({ c, pair, title: `Photo ${i + 2}` });
      pal.push([c, pair], [pair, c]);
    });

    paletteSets.photo = { swatches, palette: pal };

    // If already in highlight mode, refresh swatches to include new photo colors
    if (chipStyle === 'highlight') loadHighlightSwatches();

    // Add tab if not present
    let tab = document.getElementById('paletteTabPhoto');
    if (!tab) {
      tab = document.createElement('button');
      tab.className = 'palette-tab';
      tab.id = 'paletteTabPhoto';
      tab.textContent = '📷 Photo';
      tab.onclick = function() { switchPalette('photo', this); };
      document.getElementById('paletteTabs').appendChild(tab);
    }
    switchPalette('photo', tab);
  }

  // ── Pixel-level content detection ──
  function isSkinTone(r, g, b) {
    if (r < 50) return false;
    // Light to medium skin
    if (r > 95 && g > 40 && b > 20 &&
        Math.max(r,g,b) - Math.min(r,g,b) > 15 &&
        r > g && r > b && r - g > 10) return true;
    // Medium to dark skin
    if (r > 60 && r < 220 && r > g && r > b &&
        r - b > 10 && r - g >= 2 &&
        g > 30 && b > 15) return true;
    return false;
  }

  function analyzePhotoContent(dataUrl, cb) {
    const img = new Image();
    img.onload = () => {
      const size = 120;
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      const data = ctx.getImageData(0, 0, size, size).data;

      let skin = 0, green = 0, total = 0;
      let skyBlue = 0, skyGrey = 0, skyDark = 0, skyTotal = 0;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
        if (a < 128) continue;
        total++;
        const row = Math.floor((i / 4) / size);
        const isTop = row < size * 0.38;

        if (isSkinTone(r, g, b)) skin++;
        if (g > 70 && g > r * 1.08 && g > b * 1.08 && g - Math.min(r,b) > 25) green++;

        if (isTop) {
          skyTotal++;
          const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
          if (b > 100 && b > r * 1.15 && b >= g * 0.85 && mx - mn > 20) skyBlue++;
          else if (mx > 140 && mx - mn < 35) skyGrey++;
          else if (mx < 65) skyDark++;
        }
      }

      const n = total || 1, st = skyTotal || 1;
      const skinRatio  = skin  / n;
      const greenRatio = green / n;
      const skyBlueR   = skyBlue / st;
      const skyGreyR   = skyGrey / st;
      const skyDarkR   = skyDark / st;

      const hasPeople  = skinRatio  > 0.06;
      const hasNature  = greenRatio > 0.20;
      const weather    = skyBlueR > 0.22 ? 'sunny'
                       : skyDarkR > 0.45 ? 'night'
                       : skyGreyR > 0.28 ? 'cloudy' : 'neutral';

      cb({ hasPeople, hasNature, weather, skinRatio, greenRatio });
    };
    img.src = dataUrl;
  }

  function suggestPhotoText(colors, content = {}) {
    if (!colors.length) return;

    // Overall brightness / warmth from palette
    let tR = 0, tG = 0, tB = 0;
    colors.forEach(({c}) => { const [r,g,b] = hexToRgb(c); tR+=r; tG+=g; tB+=b; });
    const n = colors.length;
    const lum  = (0.299*tR/n + 0.587*tG/n + 0.114*tB/n) / 255;
    const warm = (tR/n - tB/n) / 255;
    const bright = lum > 0.42, warmth = warm > 0.04;

    // ── Content-aware quote pools ──
    const pools = {

      // People detected
      people_sunny:  [
        ['Happy Faces',   'Keep these ones close, they make everything better.'],
        ['Good People',   'The ones who show up and make the whole day worth it.'],
        ['Together',      'This is what it looks like when everyone is present.'],
      ],
      people_cloudy: [
        ['Still Good',    'Grey skies, good company — nothing to complain about.'],
        ['Here We Are',   'Anywhere feels right with the right people around.'],
        ['Our Days',      'Not every day is perfect but these people make it close.'],
      ],
      people_night:  [
        ['Good Company',  'Nothing better than the right people in the right place.'],
        ['These People',  'Worth every late night and every slow morning after.'],
        ['Night Crew',    'The ones who make staying out feel like staying home.'],
      ],
      people_warm:   [
        ['Golden Crew',   'The ones who make every ordinary moment feel like gold.'],
        ['Close Friends', 'Warm, loud, and exactly what I needed today.'],
        ['Full House',    'This kind of energy is something you want to bottle up.'],
      ],

      // Nature / outdoors
      nature_sunny:  [
        ['Out There',     'Some places just feel like freedom the moment you arrive.'],
        ['Fresh Air',     'The best days always seem to start outside somewhere.'],
        ['Good Spot',     'Found it, loved it, and never wanted to leave.'],
      ],
      nature_cloudy: [
        ['Out Anyway',    'Weather never stopped a good walk or a good story.'],
        ['Still Beautiful','Even the grey days have somewhere they want to take you.'],
        ['Quiet Outside', 'The world was calm out there and so were we.'],
      ],
      nature_night:  [
        ['Under Stars',   'Some nights you just have to go outside and look up.'],
        ['Night Walk',    'The world gets quieter after dark and that is a good thing.'],
        ['Late Outside',  'Out here long after we should have gone home.'],
      ],

      // Night / urban (no strong nature or people signal)
      night_vivid:   [
        ['Night Out',     'The kind of night you end up talking about for years.'],
        ['After Dark',    'Something about the night makes everything feel alive.'],
        ['Stay Up',       'Some stories only start after everything else goes quiet.'],
      ],
      night_muted:   [
        ['Still Here',    'Just me and everything I quietly want to remember.'],
        ['Inner World',   'Sometimes the quietest moments carry the most weight.'],
        ['Far Away',      'Lost in thought and somehow finding something good there.'],
      ],

      // Bright warm — sunny lifestyle, golden hour
      bright_warm:   [
        ['Good Day',      'The kind you want to live all over again from the start.'],
        ['Golden Days',   'Keep this one close — it was a really good one.'],
        ['Feeling Good',  'Some days just hit different and this was one of them.'],
      ],

      // Bright cool — airy, open, calm
      bright_cool:   [
        ['Our Story',     'Still writing the best parts, one slow day at a time.'],
        ['Easy Days',     'No rush, no plans, just here and happy about it.'],
        ['Collect Memories', 'The simple ones are always the ones that stay longest.'],
      ],

      // Soft / muted warm — cosy, slow
      soft_warm:     [
        ['Small Moments', 'The quiet ones are always the ones worth keeping most.'],
        ['Right Here',    'Nothing fancy — just exactly where I wanted to be.'],
        ['Full Heart',    'Nothing extra needed, this was already more than enough.'],
      ],

      // Dark / muted cool — moody, reflective
      dark_cool:     [
        ['Deep Roots',    'The people and places that quietly shape who you are.'],
        ['Slow Days',     'Learning to love the in-between moments most of all.'],
        ['Into the Depth','There is beauty in everything that is still and quiet.'],
      ],
    };

    // Pick the most relevant pool based on content signals
    const { hasPeople, hasNature, weather } = content;

    let pool;
    if (hasPeople) {
      pool = weather === 'sunny'  ? pools.people_sunny
           : weather === 'cloudy' ? pools.people_cloudy
           : weather === 'night'  ? pools.people_night
           :                        pools.people_warm;
    } else if (hasNature) {
      pool = weather === 'sunny'  ? pools.nature_sunny
           : weather === 'cloudy' ? pools.nature_cloudy
           : weather === 'night'  ? pools.nature_night
           : bright && warmth     ? pools.nature_sunny
           :                        pools.nature_cloudy;
    } else if (weather === 'night' || (!bright && !warmth)) {
      const mx = Math.max(tR/n,tG/n,tB/n)/255;
      const mn = Math.min(tR/n,tG/n,tB/n)/255;
      const sat = mx > 0 ? (mx-mn)/mx : 0;
      pool = sat > 0.28 ? pools.night_vivid : pools.night_muted;
    } else if (bright && warmth) {
      pool = pools.bright_warm;
    } else if (bright && !warmth) {
      pool = pools.bright_cool;
    } else if (!bright && warmth) {
      pool = pools.soft_warm;
    } else {
      pool = pools.dark_cool;
    }

    _photoQuotes   = [...pool];
    _photoQuoteIdx = Math.floor(Math.random() * _photoQuotes.length);
    const [title, desc] = _photoQuotes[_photoQuoteIdx];
    document.getElementById('bgInput').value = `${title}\n${desc}`;
    renderBg();
  }

  function loadPhotoFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const photoBg   = document.getElementById('photoBg');
    const removeBtn = document.getElementById('photoRemoveBtn');
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      photoBg.style.backgroundImage = `url('${dataUrl}')`;
      removeBtn.style.display = 'block';
      // Run color extraction and content analysis in parallel
      let colors = null, content = null;
      const tryGenerate = () => {
        if (colors !== null && content !== null) {
          buildPhotoPalette(colors);
          suggestPhotoText(colors, content);
        }
      };
      extractPhotoColors(dataUrl, c => { colors = c;   tryGenerate(); });
      analyzePhotoContent(dataUrl, c => { content = c; tryGenerate(); });
    };
    reader.readAsDataURL(file);
  }

  function removePhoto() {
    document.getElementById('photoBg').style.backgroundImage = '';
    document.getElementById('photoRemoveBtn').style.display = 'none';
    document.getElementById('photoInput').value = '';
    _photoQuotes = []; _photoQuoteIdx = -1; // reset to preset cycling
    // Remove photo palette tab and switch back to earth
    const tab = document.getElementById('paletteTabPhoto');
    if (tab) tab.remove();
    delete paletteSets.photo;
    if (chipStyle === 'highlight') { loadHighlightSwatches(); renderBg(); return; }
    const earthTab = document.querySelector('#paletteTabs .palette-tab');
    if (earthTab) switchPalette('earth', earthTab);
  }

  // Drag-and-drop: use enter counter to avoid misfires from child elements
  let _dragCount = 0;
  const _page = document.getElementById('page');
  _page.addEventListener('dragenter', e => {
    e.preventDefault();
    if (e.dataTransfer.types.includes('Files')) {
      _dragCount++;
      _page.classList.add('drag-over');
    }
  });
  _page.addEventListener('dragover', e => { e.preventDefault(); });
  _page.addEventListener('dragleave', () => {
    _dragCount--;
    if (_dragCount <= 0) { _dragCount = 0; _page.classList.remove('drag-over'); }
  });
  _page.addEventListener('drop', e => {
    e.preventDefault();
    _dragCount = 0;
    _page.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadPhotoFile(file);
  });

  // ── Drag-to-reposition text (chip / overlay modes) ──
  let _textDrag = false, _tdX, _tdY, _tdOrigX, _tdOrigY;

  _page.addEventListener('pointerdown', e => {
    if (chipStyle === 'postit') return;                       // postit has its own drag
    if (e.target.closest('button')) return;                   // ignore button clicks
    if (e.pointerType === 'mouse' && e.button !== 0) return;  // left-click only
    _textDrag = true;
    _tdX = e.clientX; _tdY = e.clientY;
    _tdOrigX = bgOffsetX; _tdOrigY = bgOffsetY;
    _page.setPointerCapture(e.pointerId);
    _page.style.cursor = 'grabbing';
  });

  const _snapThreshold = 4; // % — snaps when within this distance of center
  const _snapH = document.getElementById('snapH');
  const _snapV = document.getElementById('snapV');

  function _hideGuides() {
    _snapH.classList.remove('visible');
    _snapV.classList.remove('visible');
  }

  _page.addEventListener('pointermove', e => {
    if (!_textDrag) return;
    const pw = _page.offsetWidth, ph = _page.offsetHeight;
    let rawX = _tdOrigX + (e.clientX - _tdX) / pw * 100;
    let rawY = _tdOrigY + (e.clientY - _tdY) / ph * 100;

    // Snap to horizontal center (Y=0)
    if (Math.abs(rawY) < _snapThreshold) { rawY = 0; _snapH.classList.add('visible'); }
    else { _snapH.classList.remove('visible'); }

    // Snap to vertical center (X=0)
    if (Math.abs(rawX) < _snapThreshold) { rawX = 0; _snapV.classList.add('visible'); }
    else { _snapV.classList.remove('visible'); }

    bgOffsetX = rawX;
    bgOffsetY = rawY;

    // Keep vertical slider in sync
    const sl = document.getElementById('bgOffsetSlider');
    if (sl) sl.value = Math.max(-50, Math.min(50, bgOffsetY));
    renderBg();
  });

  _page.addEventListener('pointerup', () => {
    if (!_textDrag) return;
    _textDrag = false;
    _hideGuides();
    _page.style.cursor = chipStyle !== 'postit' ? 'grab' : '';
  });
  _page.addEventListener('pointercancel', () => {
    _textDrag = false;
    _hideGuides();
    _page.style.cursor = chipStyle !== 'postit' ? 'grab' : '';
  });

  // Double-click to re-center text
  _page.addEventListener('dblclick', e => {
    if (chipStyle === 'postit') return;
    bgOffsetX = 0; bgOffsetY = 0;
    const sl = document.getElementById('bgOffsetSlider');
    if (sl) sl.value = 0;
    renderBg();
  });

  // Hide post-it rotate handle when tapping outside the canvas
  document.addEventListener('pointerdown', e => {
    if (!_activeRotHandle) return;
    if (!_page.contains(e.target)) {
      _activeRotHandle.style.display = 'none';
    }
  });

  // Set initial grab cursor
  _page.style.cursor = 'grab';

  updatePreviews();
  renderBg();
  editor.focus();
</script>
</body>
</html>
