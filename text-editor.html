<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Text Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: #F1E9DA;
      display: flex; flex-direction: column; height: 100vh; color: #264F56;
    }
    .btn {
      border: none; cursor: pointer; font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 20px; transition: all .15s;
      font-family: inherit;
    }
    .btn-ghost { background: #F1E9DA; color: #264F56; }
    .btn-ghost:hover { background: #e8e3db; }
    .btn-primary { background: #264F56; color: #F1E9DA; }
    .btn-primary:hover { background: #1a3840; }


    /* ── CONTROL BAR ── */
    .controlbar {
      display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
      padding: 10px 20px 12px; background: #fff;
      border-bottom: 1px solid #e8e3db;
    }
    .ctrl-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;
    }

    .controlbar textarea {
      border: 1.5px solid #e8e3db; border-radius: 8px; padding: 5px 11px;
      font-size: 13px; outline: none; background: #fafaf8;
      color: #264F56; width: 200px; font-family: 'Caveat', cursive;
      font-weight: 600; resize: vertical; min-height: 34px; max-height: 90px;
      line-height: 1.4; vertical-align: top;
    }
    .controlbar textarea:focus { border-color: #264F56; }
    .controlbar textarea::placeholder {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-weight: 400; font-size: 12px; color: #bbb;
    }

    .controlbar input[type="range"] {
      accent-color: #264F56; width: 72px; cursor: pointer;
    }

    .ctrl-label {
      font-size: 11px; font-weight: 600; color: #999; white-space: nowrap;
    }

    /* ── COLOR SWATCHES — mini post-it thumbnails ── */
    .palette-group { display: flex; flex-direction: column; gap: 5px; }
    .palette-tabs  { display: flex; gap: 3px; }
    .palette-tab {
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; white-space: nowrap;
      padding: 3px 9px; border-radius: 10px; border: none;
      background: transparent; color: #bbb; cursor: pointer;
      font-family: inherit; transition: color .12s, background .12s;
    }
    .palette-tab:hover  { color: #264F56; }
    .palette-tab.active { color: #264F56; background: rgba(38,79,86,0.10); }
    .swatch-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .swatch {
      width: 32px; height: 32px; border-radius: 3px; cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 3px 7px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
      transition: transform .14s, box-shadow .14s;
      flex-shrink: 0;
      position: relative; overflow: hidden;
    }
    /* Separator line — mimics the note header rule */
    .swatch::after {
      content: '';
      position: absolute;
      top: 30%; left: 12%; right: 12%;
      height: 1px;
      background: rgba(0,0,0,0.18);
      pointer-events: none;
    }
    .swatch:hover {
      transform: scale(1.12) rotate(-2deg);
      box-shadow: 0 6px 14px rgba(0,0,0,0.26), 0 0 0 1px rgba(0,0,0,0.08);
    }
    .swatch.active {
      border-color: #264F56;
      box-shadow: 0 4px 10px rgba(0,0,0,0.28), 0 0 0 2px #264F56;
      transform: scale(1.06);
    }


    /* ── COLLAGE / OVERLAY TOGGLE ── */
    .mode-toggle {
      display: flex; align-items: center; gap: 0;
      border: 1.5px solid #e8e3db; border-radius: 20px;
      overflow: hidden; background: #f5f4f1;
    }
    .mode-toggle button {
      border: none; cursor: pointer; font-size: 11px;
      font-weight: 700; padding: 5px 11px;
      background: transparent; color: #999;
      transition: all .15s; font-family: inherit;
    }
    .mode-toggle button.active { background: #264F56; color: #F1E9DA; }
    /* ── COLOR MODE TOGGLE ── */
    .color-mode-toggle {
      display: flex; align-items: center;
      border: 1.5px solid #e8e3db; border-radius: 20px;
      overflow: hidden; background: #f5f4f1;
    }
    .color-mode-toggle button {
      border: none; cursor: pointer; font-size: 11px;
      font-weight: 700; padding: 5px 11px;
      background: transparent; color: #999;
      transition: all .15s; font-family: inherit;
    }
    .color-mode-toggle button.active { background: #264F56; color: #F1E9DA; }

    /* ── LIGHT / DARK TEXT TOGGLE ── */
    .txt-toggle {
      display: flex; align-items: center; gap: 0;
      border: 1.5px solid #e8e3db; border-radius: 20px;
      overflow: hidden; background: #f5f4f1;
    }
    .txt-toggle button {
      border: none; cursor: pointer; font-size: 11px;
      font-weight: 700; padding: 5px 11px;
      background: transparent; color: #999;
      transition: all .15s; font-family: inherit;
    }
    .txt-toggle button.active {
      background: #264F56; color: #F1E9DA;
    }

    /* ── SHOW TOGGLE ── */
    .show-toggle {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 11px; font-weight: 600; color: #999;
      user-select: none;
    }
    .show-toggle input { accent-color: #264F56; }


    /* ── DIVIDER ── */
    .ctrl-sep {
      width: 1px; height: 20px; background: #e8e3db; flex-shrink: 0;
    }

    /* ── EDITOR AREA ── */
    .editor-wrap {
      flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column;
      align-items: center; padding: 14px 20px 12px; gap: 0;
    }
    .page-frame {
      flex: 1; min-height: 0; display: flex; align-items: center;
      justify-content: center; width: 100%; padding-bottom: 12px;
      gap: 10px;
    }
    .v-slider-wrap {
      display: flex; flex-direction: column; align-items: center;
      align-self: stretch; justify-content: center;
      padding: 6px 0;
    }
    .v-slider-wrap input[type=range] {
      writing-mode: vertical-lr;
      flex: 1; min-height: 0;
      width: 22px;
      accent-color: #264F56;
      cursor: ns-resize;
      background: transparent;
    }
    .page {
      position: relative;
      aspect-ratio: 1 / 1;
      height: 100%;
      max-width: calc(100vw - 40px);
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 32px rgba(38,79,86,.10); overflow: hidden;
    }
    .page.drag-over { outline: 3px dashed #264F56; outline-offset: -6px; }
    .snap-guide {
      position: absolute; z-index: 15; pointer-events: none;
      background: rgba(255,255,255,0.50); opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .snap-guide.dark { background: rgba(30,30,30,0.50); }
    .snap-guide.h { left: 5%; width: 90%; height: 1px; top: 50%; transform: translateY(-50%); }
    .snap-guide.v { top: 5%; height: 90%; width: 1px; left: 50%; transform: translateX(-50%); }
    .snap-guide.visible { opacity: 1; }
    .postit-rot-handle {
      position: absolute;
      width: 24px; height: 24px;
      background: rgba(255,255,255,0.92);
      border: 1.5px solid rgba(38,79,86,0.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; line-height: 1;
      cursor: grab; z-index: 30;
      user-select: none; touch-action: none;
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
      pointer-events: auto;
      transform: translate(50%, -50%);
    }
    .postit-rot-handle:hover { background: #fff; border-color: rgba(38,79,86,0.6); }
    .page-photo-bg {
      position: absolute; inset: 0; z-index: 0;
      background-size: cover; background-position: center; background-repeat: no-repeat;
      border-radius: 16px;
    }
    #photoAddBtn, #photoRemoveBtn {
      position: absolute; top: 10px; z-index: 20;
      background: rgba(0,0,0,0.38); color: #fff; border: none;
      border-radius: 20px; font-size: 12px; font-weight: 700;
      padding: 5px 10px; cursor: pointer;
      font-family: inherit; transition: background .15s;
    }
    #photoAddBtn  { right: 10px; }
    #photoRemoveBtn { right: 52px; display: none; }
    #photoAddBtn:hover, #photoRemoveBtn:hover { background: rgba(0,0,0,0.62); }

    /* ── TEXT INPUT ROW ── */
    .text-input-row {
      position: relative;
      width: 100%; max-width: 360px; margin-top: 10px;
    }
    .text-input-row textarea {
      width: 100%; border: 1.5px solid #e8e3db; border-radius: 12px;
      padding: 10px 80px 10px 14px; font-size: 13px; outline: none;
      background: #fafaf8; color: #264F56;
      font-family: 'Caveat', cursive; font-weight: 600;
      resize: none; height: 64px;
      line-height: 1.5; box-sizing: border-box;
    }
    .text-input-row textarea:focus { border-color: #264F56; }
    .text-input-row .btn-inside {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: #F1E9DA; color: #264F56; border: none; border-radius: 18px;
      padding: 6px 13px; font-size: 12px; font-weight: 700;
      font-family: inherit; cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    .text-input-row .btn-inside:hover { background: #e8e3db; }

    /* ── STYLE BAR ── */
    .style-bar {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .style-btn {
      border: 1.5px solid #e8e3db; background: #fff; color: #999;
      border-radius: 20px; padding: 6px 18px; font-size: 12px;
      font-weight: 700; cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .style-btn:hover { border-color: #264F56; color: #264F56; }
    .style-btn.active { background: #264F56; color: #F1E9DA; border-color: #264F56; }
    .bg-text-layer {
      position: absolute; inset: 0;
      pointer-events: none; user-select: none; overflow: hidden;
    }
    .bg-text-layer canvas { position: absolute; inset: 0; }

    .editor {
      position: relative; z-index: 1; min-height: 480px; width: 100%;
      padding: 36px 44px; outline: none; border: none; resize: none;
      font-family: 'Caveat', cursive;
      font-size: 20px; line-height: 1.7; color: #264F56;
      caret-color: transparent; background: transparent;
      cursor: default; pointer-events: none; user-select: none;
      box-sizing: border-box;
    }
    .editor::placeholder {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-size: 15px; color: #ccc; font-weight: 400;
    }

    /* ── CHIP ANIMATIONS ── */
    @keyframes chipBounceIn {
      0%   { opacity: 0; transform: translateX(-22px) scale(0.7); }
      55%  { opacity: 1; transform: translateX(5px) scale(1.06); }
      75%  { transform: translateX(-2px) scale(0.97); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes chipSparkleIn {
      0%   { opacity: 0; transform: scale(0.12) rotate(-14deg); }
      52%  { opacity: 1; transform: scale(1.16) rotate(5deg); }
      74%  { transform: scale(0.92) rotate(-2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes starParticle {
      0%   { opacity: 1; transform: translate(0,0) scale(1.3); }
      100% { opacity: 0; transform: translate(var(--pdx),var(--pdy)) scale(0); }
    }
    @keyframes chipReveal {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }
    /* Animation dropdown */
    .anim-select {
      border: 1.5px solid #e8e3db; border-radius: 20px;
      padding: 5px 14px; font-size: 11px; font-weight: 700;
      background: #f5f4f1; color: #264F56;
      cursor: pointer; font-family: inherit; outline: none;
      -webkit-appearance: none; appearance: none;
    }
    .anim-select:focus { border-color: #264F56; }
    .anim-intensity-slider {
      width: 60px; accent-color: #264F56; cursor: pointer;
      vertical-align: middle;
    }

    /* ── STATUS BAR ── */
    .statusbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 20px; font-size: 11px; color: #bbb;
      background: #fff; border-top: 1px solid #e8e3db;
    }
    .statusbar b { color: #264F56; font-weight: 700; }
  /* ── SAVE MENU ── */
  #saveMenuBackdrop { position:fixed; inset:0; z-index:9998; }
  #saveMenu {
    position:fixed; z-index:9999;
    background:#fff; border:1px solid #e0dbd3; border-radius:12px;
    box-shadow:0 8px 28px rgba(0,0,0,0.14); padding:6px;
    display:flex; flex-direction:column; gap:3px; min-width:168px;
  }
  #saveMenu button {
    background:none; border:none; padding:9px 14px;
    text-align:left; font-size:13px; font-weight:600;
    font-family:inherit; color:#264F56; border-radius:8px;
    cursor:pointer; transition:background .12s; display:flex; gap:8px; align-items:center;
  }
  #saveMenu button:hover { background:#f0ede8; }
  #saveMenu .save-menu-sep { height:1px; background:#e8e3db; margin:3px 0; }
  .save-btn {
    padding:5px 12px; font-size:12px; display:flex; align-items:center; gap:5px;
  }
  </style>
</head>
<body>

<!-- CONTROL BAR -->
<div class="controlbar">

  <!-- ROW 1: Color (all on one line) -->
  <div class="ctrl-row">
    <span class="ctrl-label" id="colorLabel">Color</span>
    <div class="palette-group">
      <div class="palette-tabs" id="paletteTabs">
        <button class="palette-tab active" onclick="switchPalette('earth',this)">Earth Tone</button>
        <button class="palette-tab"        onclick="switchPalette('summer',this)">Summer</button>
        <button class="palette-tab"        onclick="switchPalette('xmas',this)">Xmas</button>
        <button class="palette-tab"        onclick="switchPalette('paper',this)">Paper</button>
      </div>
      <!-- Highlight sub-tabs (shown only in Highlight mode) -->
      <div class="palette-tabs" id="hlTabs" style="display:none">
        <button class="palette-tab active" id="hlTabDefault" onclick="switchHlTab('default',this)">Default</button>
        <button class="palette-tab"        id="hlTabPhoto"   onclick="switchHlTab('photo',this)" style="display:none">Photo</button>
      </div>
      <div class="swatch-row" id="chipRow">
        <div class="swatch active" style="background:#F1E9DA" data-c="#F1E9DA" data-pair="#613339" title="Birch ↔ Berry"    onclick="pickChip(this)"></div>
        <div class="swatch"        style="background:#B99ABB" data-c="#B99ABB" data-pair="#613339" title="Lilac ↔ Berry"    onclick="pickChip(this)"></div>
        <div class="swatch"        style="background:#DE896C" data-c="#DE896C" data-pair="#264F56" title="Peach ↔ Teal"     onclick="pickChip(this)"></div>
        <div class="swatch"        style="background:#EDC470" data-c="#EDC470" data-pair="#613339" title="Saffron ↔ Berry"  onclick="pickChip(this)"></div>
        <div class="swatch"        style="background:#ADB2C4" data-c="#ADB2C4" data-pair="#264F56" title="Bluebells ↔ Teal" onclick="pickChip(this)"></div>
        <div class="swatch"        style="background:#D1D48B" data-c="#D1D48B" data-pair="#264F56" title="Guava ↔ Teal"     onclick="pickChip(this)"></div>
        <div class="swatch"        style="background:#BEACDF" data-c="#BEACDF" data-pair="#613339" title="Wisteria ↔ Berry" onclick="pickChip(this)"></div>
        <div class="swatch"        style="background:#E3B17F" data-c="#E3B17F" data-pair="#264F56" title="Sand ↔ Teal"      onclick="pickChip(this)"></div>
      </div>
    </div>
    <div class="color-mode-toggle" id="colorModeToggle">
      <button id="btnSingle" class="active" onclick="setMultiColor(false,this)">Single</button>
      <button id="btnMulti"                 onclick="setMultiColor(true,this)">Multi</button>
    </div>
    <!-- Highlight opacity (shown only in Highlight mode) -->
    <div id="hlOpacitySection" style="display:none;align-items:center;gap:6px">
      <span class="ctrl-label">Opacity</span>
      <input type="range" id="hlOpacitySlider" min="10" max="100" step="5" value="75"
        style="width:72px;accent-color:#264F56;cursor:pointer"
        oninput="setHighlightOpacity(this.value)">
      <span id="hlOpacityVal" style="font-size:11px;color:#999;min-width:28px">75%</span>
    </div>
  </div>

  <!-- ROW 2: Other settings -->
  <div class="ctrl-row">
    <span class="ctrl-label">Text Size</span>
    <input type="range" id="bgSize" min="12" max="40" value="22" oninput="renderBg()"
      style="width:72px;accent-color:#264F56;cursor:pointer"/>
    <div id="widthSection" style="display:flex;align-items:center;gap:6px">
      <div class="ctrl-sep"></div>
      <span class="ctrl-label">Width</span>
      <input type="range" id="lineWidthSlider" min="30" max="100" step="5" value="100"
        style="width:72px;accent-color:#264F56;cursor:pointer"
        oninput="setLineWidth(this.value)">
      <span id="lineWidthVal" style="font-size:11px;color:#999;min-width:28px">100%</span>
    </div>
    <!-- Newspaper word/line toggle (shown only in Newspaper mode) -->
    <div id="newspaperModeSection" style="display:none;align-items:center;gap:6px">
      <div class="ctrl-sep"></div>
      <span class="ctrl-label">Per</span>
      <div class="mode-toggle" id="newspaperModeToggle">
        <button id="btnNpWord" onclick="setNewspaperMode('word',this)">Word</button>
        <button id="btnNpLine" class="active" onclick="setNewspaperMode('line',this)">Line</button>
      </div>
    </div>
    <!-- Post-it size (shown only in Post-it mode) -->
    <div id="postitScaleSection" style="display:none;align-items:center;gap:6px">
      <div class="ctrl-sep"></div>
      <span class="ctrl-label">Post-it Size</span>
      <input type="range" id="postitScaleSlider" min="25" max="200" step="5" value="100"
        style="width:64px;accent-color:#264F56;cursor:pointer"
        oninput="setPostitScale(this.value)">
      <span id="postitScaleVal" style="font-size:11px;color:#999;min-width:28px">100%</span>
    </div>
    <div class="ctrl-sep"></div>
    <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px" onclick="shuffleBg()">↻ Shuffle</button>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label">Anim</span>
    <select id="animSelect" class="anim-select" onchange="setAnimation(this.value)">
      <option value="off">Off</option>
      <option value="bounce">↙ Bounce</option>
      <option value="sparkle">✦ Sparkle</option>
      <option value="typing">▌ Typing</option>
    </select>
    <input type="range" id="animIntensitySlider" class="anim-intensity-slider"
      min="1" max="100" value="50" style="display:none"
      oninput="setAnimIntensity(+this.value)" title="Animation intensity">
    <div class="ctrl-sep"></div>
    <label class="show-toggle">
      <input type="checkbox" id="bgVisibleToggle" checked
        onchange="document.getElementById('bgVisible').checked=this.checked; renderBg();">
      Text BG
    </label>
    <div class="ctrl-sep"></div>
    <button id="saveBtn" class="btn btn-ghost save-btn" onclick="handleSave()">⬇ Save</button>
  </div>

  <!-- Hidden functional elements (JS needs these) -->
  <div style="display:none">
    <input type="checkbox" id="bgVisible" checked onchange="renderBg()"/>
    <button id="btnCollage" class="active" onclick="setMode('chips',this)">Collage</button>
    <button id="btnOverlay"               onclick="setMode('overlay',this)">Overlay</button>
  </div>

</div>

<!-- PAGE -->
<div class="editor-wrap">
  <div class="page-frame">
    <div class="page" id="page">
      <div class="page-photo-bg" id="photoBg"></div>
      <button id="photoAddBtn" onclick="document.getElementById('photoInput').click()" title="Add photo background">📷</button>
      <button id="photoRemoveBtn" onclick="removePhoto()">✕</button>
      <div class="snap-guide h" id="snapH"></div>
      <div class="snap-guide v" id="snapV"></div>
      <div class="bg-text-layer" id="bgLayer"></div>
      <textarea class="editor" id="editor" readonly tabindex="-1"></textarea>
    </div>
    <div class="v-slider-wrap">
      <input type="range" id="bgOffsetSlider" min="-50" max="50" step="1" value="0"
        oninput="setBgOffset(this.value)" title="Move text up / down">
    </div>
  </div>
  <!-- Text input row: below canvas, above style pills -->
  <div class="text-input-row">
    <textarea id="bgInput" placeholder="Background text…" oninput="renderBg()"></textarea>
    <button class="btn-inside" onclick="resetBgText()" title="Next preset text">↺ Reset</button>
  </div>

  <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="loadPhotoFile(this.files[0])">
  <div class="style-bar">
    <button id="btnRounded"      class="style-btn active" onclick="setChipStyle('rounded',this)">Rounded</button>
    <button id="btnHighlight"    class="style-btn"        onclick="setChipStyle('highlight',this)">Highlight</button>
    <button id="btnPostit"       class="style-btn"        onclick="setChipStyle('postit',this)">Post-it</button>
    <button id="btnNewspaper"    class="style-btn"        onclick="setChipStyle('newspaper',this)">Newspaper</button>
    <button id="btnSelectionBar" class="style-btn"        onclick="setChipStyle('selectionbar',this)">Selection Bar</button>
  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div>Words <b id="wordCount">0</b> &nbsp; Chars <b id="charCount">0</b></div>
  <div style="display:flex;align-items:center;gap:10px">
    <label class="show-toggle" title="Export with a transparent background instead of white">
      <input type="checkbox" id="transparentBgToggle">
      Transparent BG
    </label>
    <button class="btn btn-primary" onclick="exportPng()" style="padding:5px 16px;font-size:12px">⬇ Export PNG</button>
  </div>
</div>

<script>
  
  const editor    = document.getElementById('editor');
  const bgLayer   = document.getElementById('bgLayer');
  const bgInput   = document.getElementById('bgInput');
const bgSize    = document.getElementById('bgSize');
  const bgVisible = document.getElementById('bgVisible');

  let chipColor   = '#F1E9DA';
  let mode        = 'chips';
  let chipStyle   = 'rounded';
  let textColor   = '#613339';
  let masterSeed  = 42;
  let multiColor          = false;

  /* ════════════════════════════════
     ORGANIC CHIP SHAPE
     Base = text bounding box.
     Each edge = one quadratic-bezier
     bow (outward only).
     Corners = clean arcs.
  ════════════════════════════════ */
  /* ═══════════════════════════════════════════════════════
     ORGANIC PILL  — pill base + organic waves on long edges
     ─────────────────────────────────────────────────────
     Shape = pill (two semicircle caps + straight middle).
     The LEFT / RIGHT caps stay perfectly round.
     The TOP / BOTTOM long edges each get ONE smooth organic
     sine wave — giving the hand-cut paper feel without
     making the shape look like an ellipse or blob.
     Catmull-Rom through all points → single smooth curve.
  ═══════════════════════════════════════════════════════ */
  /* ── HIGHLIGHT shape: hand-painted brush/marker stroke ──
     Draws and fills directly (does not just define a path).
     Always consumes exactly 42 rng() calls for determinism:
       4 (crop) + 18 (top edge) + 18 (bot edge) + 2 (side noise) = 42
  ── */
  function drawHighlight(ctx, textW, fontSize, color) {
    // === Partial coverage: 28% chance either end is cropped ===
    const pL = rng(), aL = rng(), pR = rng(), aR = rng();   // 4 calls
    // Max crop per side = 5% of textW → guaranteed ≥ 90% coverage
    const cropL = pL < 0.40 ? aL * 0.05 : 0;
    const cropR = pR < 0.40 ? aR * 0.05 : 0;

    const baseHW = textW / 2 + fontSize * 0.08;
    const xL     = -baseHW + textW * cropL;   // left boundary
    const xR     =  baseHW - textW * cropR;   // right boundary
    const ht     = fontSize * 0.33;            // half-height (cap-height only)
    const amp    = fontSize * 0.048;           // edge roughness amplitude

    // === Rough edge generator ===
    // Always exactly N interior points → always N*2 rng() calls
    const N = 9;
    function roughEdge(x0, x1, baseY) {
      const pts = [[x0, baseY]];
      for (let i = 1; i <= N; i++) {
        const ra = rng(), rb = rng();
        const f  = i / (N + 1);
        const w  = Math.sin(f * Math.PI);   // taper noise to 0 at corners
        // Two-component noise: fine random + occasional coarser bristle notch
        const dy = ((ra - 0.5) * 2.0 + (rb - 0.5) * 0.7) * amp * w;
        pts.push([x0 + f * (x1 - x0), baseY + dy]);
      }
      pts.push([x1, baseY]);
      return pts;   // N+2 points, N*2 rng calls
    }

    const topE = roughEdge(xL, xR, -ht);    // 18 rng calls
    const botE = roughEdge(xL, xR,  ht);    // 18 rng calls
    const nL   = (rng() - 0.5) * amp * 0.8; // 1 call — left side lean
    const nR   = (rng() - 0.5) * amp * 0.8; // 1 call — right side lean
    // Total so far: 4 + 18 + 18 + 2 = 42 rng calls ✓

    // === Build the brush-stroke path ===
    ctx.beginPath();
    ctx.moveTo(topE[0][0], topE[0][1]);
    // Top edge left → right (jagged)
    for (let i = 1; i < topE.length; i++) ctx.lineTo(topE[i][0], topE[i][1]);
    // Right side (slightly angled for brush-lift feel)
    ctx.lineTo(xR + nR, ht);
    // Bottom edge right → left (jagged, reversed)
    for (let i = botE.length - 1; i >= 0; i--) ctx.lineTo(botE[i][0], botE[i][1]);
    // Left side
    ctx.lineTo(xL + nL, -ht);
    ctx.closePath();

    // Fill: two-pass for soft layered ink look
    ctx.globalAlpha = highlightBgOpacity;
    ctx.fillStyle   = color;
    ctx.fill();
    // Second pass: slight downward offset simulates marker ink pooling
    ctx.save();
    ctx.translate(0, fontSize * 0.012);
    ctx.globalAlpha = highlightBgOpacity * 0.10;
    ctx.fill();
    ctx.restore();

    ctx.globalAlpha = 1;
  }

  /* ── POST-IT shape: sticky note with dog-ear fold ──
     Always consumes exactly 5 rng() calls for determinism.
  ── */
  function drawPostit(ctx, textW, fontSize, color) {
    // Pre-roll all randoms (fixed count = 5)
    const r0 = rng(), r1 = rng(), r2 = rng(), r3 = rng(), r4 = rng();

    const hw   = textW / 2 + fontSize * 0.34;
    const ht   = fontSize * 0.54 + (r0 - 0.5) * fontSize * 0.06;  // slight height variation
    const cr   = fontSize * 0.09;    // corner radius (small — post-it corners)
    const fold = fontSize * 0.28;    // dog-ear fold size (top-right)
    const wAmp = fontSize * 0.014;   // edge micro-wobble for hand-cut feel

    // One wobble value per edge
    const tWob = (r1 - 0.5) * wAmp;
    const rWob = (r2 - 0.5) * wAmp;
    const bWob = (r3 - 0.5) * wAmp;
    const lWob = (r4 - 0.5) * wAmp;

    // === Main note shape (top-right has dog-ear cut) ===
    ctx.beginPath();
    ctx.moveTo(-hw + cr, -ht + tWob);                                   // top-left after corner
    ctx.lineTo( hw - fold, -ht + tWob);                                 // top edge → dog-ear
    ctx.lineTo( hw + rWob, -ht + fold);                                 // dog-ear diagonal
    ctx.lineTo( hw + rWob,  ht - cr + bWob);                           // right edge
    ctx.quadraticCurveTo( hw + rWob,  ht + bWob,  hw - cr,  ht + bWob); // bottom-right corner
    ctx.lineTo(-hw + cr,  ht + bWob);                                   // bottom edge
    ctx.quadraticCurveTo(-hw + lWob,  ht + bWob, -hw + lWob, ht - cr + bWob); // bottom-left corner
    ctx.lineTo(-hw + lWob, -ht + cr + tWob);                           // left edge
    ctx.quadraticCurveTo(-hw + lWob, -ht + tWob, -hw + cr, -ht + tWob); // top-left corner
    ctx.closePath();

    ctx.globalAlpha = 0.92;
    ctx.fillStyle   = color;
    ctx.fill();

    // === Dog-ear shadow triangle ===
    ctx.beginPath();
    ctx.moveTo(hw - fold, -ht + tWob);
    ctx.lineTo(hw + rWob, -ht + fold);
    ctx.lineTo(hw - fold, -ht + fold);
    ctx.closePath();
    ctx.globalAlpha = 0.16;
    ctx.fillStyle   = '#000';
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  /* ── NEWSPAPER shape: cut paper strip with gently torn wavy edges ──
     Mimics a strip torn/cut from a magazine or newspaper.
     Long edges (top & bottom) pass through 3 Catmull-Rom jitter points
     for a smooth organic wave; short sides have a slight wobble.
     Always consumes exactly 8 rng() calls for determinism.
  ── */
  function drawNewspaper(ctx, textW, fontSize) {
    const hw  = textW / 2 + fontSize * 0.42;
    const ht  = fontSize * 0.58;
    const amp = fontSize * 0.065;       // torn-edge amplitude
    const s   = (hw * 2) / 4;          // quarter-width step between knots

    // 3 interior y-offsets per long edge + 1 x-wobble per short side = 8 rng calls
    const t1=(rng()-0.5)*amp, t2=(rng()-0.5)*amp, t3=(rng()-0.5)*amp;
    const b1=(rng()-0.5)*amp, b2=(rng()-0.5)*amp, b3=(rng()-0.5)*amp;
    const rW=(rng()-0.5)*amp*0.30,    lW=(rng()-0.5)*amp*0.30;

    // Catmull-Rom → bezier segments through a polyline
    function crSegments(pts) {
      const n = pts.length;
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 0; i < n - 1; i++) {
        const p0 = pts[Math.max(0, i - 1)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(n - 1, i + 2)];
        ctx.bezierCurveTo(
          p1.x + (p2.x - p0.x) / 6, p1.y + (p2.y - p0.y) / 6,
          p2.x - (p3.x - p1.x) / 6, p2.y - (p3.y - p1.y) / 6,
          p2.x, p2.y
        );
      }
    }

    ctx.beginPath();
    crSegments([                        // top edge, left → right
      {x: -hw,       y: -ht},
      {x: -hw + s,   y: -ht + t1},
      {x: -hw + 2*s, y: -ht + t2},
      {x: -hw + 3*s, y: -ht + t3},
      {x:  hw,       y: -ht},
    ]);
    ctx.lineTo(hw + rW, ht);            // right side
    crSegments([                        // bottom edge, right → left
      {x:  hw,       y:  ht},
      {x:  hw - s,   y:  ht + b1},
      {x:  hw - 2*s, y:  ht + b2},
      {x:  hw - 3*s, y:  ht + b3},
      {x: -hw,       y:  ht},
    ]);
    ctx.lineTo(-hw + lW, -ht);          // left side
    ctx.closePath();
  }

  /* ── SELECTION BAR shape: design-tool "selected text" look ──
     A clean rectangle with vertical selection lines and circular handles,
     mimicking text selection handles in graphic design tools.
     Consumes exactly 0 rng() calls (fully deterministic).
  ── */
  function drawSelectionBar(ctx, textW, fontSize, chipColor, lineColor) {
    const hw   = textW / 2 + fontSize * 0.20;        // rect half-width
    const ht   = fontSize * 0.45;                    // rect half-height
    const ext  = fontSize * 0.25;                    // line extension beyond rect edges
    const dotR = Math.max(3, fontSize * 0.11);       // circle handle radius
    const lw   = Math.max(1.5, fontSize * 0.030);    // line stroke width

    // ── Solid rectangle background ──
    ctx.globalAlpha = highlightBgOpacity;
    ctx.fillStyle   = chipColor;
    ctx.fillRect(-hw, -ht, hw * 2, ht * 2);
    ctx.globalAlpha = 1;

    // ── Selection lines + circle handles in lineColor ──
    ctx.strokeStyle = lineColor;
    ctx.fillStyle   = lineColor;
    ctx.lineWidth   = lw;
    ctx.lineCap     = 'round';

    // Left vertical line: extends from ext above rect-top down to rect-bottom
    ctx.beginPath();
    ctx.moveTo(-hw, -ht - ext);
    ctx.lineTo(-hw,  ht);
    ctx.stroke();

    // Right vertical line: extends from rect-top down to ext below rect-bottom
    ctx.beginPath();
    ctx.moveTo( hw, -ht);
    ctx.lineTo( hw,  ht + ext);
    ctx.stroke();

    // Top-left circle handle
    ctx.beginPath();
    ctx.arc(-hw, -ht - ext, dotR, 0, Math.PI * 2);
    ctx.fill();

    // Bottom-right circle handle
    ctx.beginPath();
    ctx.arc( hw,  ht + ext, dotR, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawOrganicBlob(ctx, textW, fontSize, padX, padY, wordLen) {
    const th = fontSize;
    // padX and padY are both pre-computed by caller — layout & drawing are in sync

    const hw = textW / 2 + padX;   // half-length of the straight section
    const r  = th  / 2 + padY;     // cap radius  (= half chip height)

    // Short words (< 3 chars) get very subtle curves
    const ampScale = wordLen < 3 ? 0.15 : 1.0;

    // Unique organic wave per top / bottom edge
    const tAmp    = th * (0.07 + rng() * 0.09) * ampScale;   // top wave depth
    const bAmp    = th * (0.07 + rng() * 0.09) * ampScale;   // bottom wave depth
    const tPhase  = rng() * Math.PI * 2;
    const bPhase  = rng() * Math.PI * 2;
    // 1 wave = single gentle arc; 2 waves = S-curve across the edge
    const tCycles = rng() < 0.65 ? 1 : 2;
    const bCycles = rng() < 0.65 ? 1 : 2;

    const Ne = 11;   // sample points per straight edge
    const Nc = 9;    // sample points per semicircle cap
    const pts = [];

    // ── Top edge: left → right  (y = −r + wave)
    for (let i = 0; i < Ne; i++) {
      const f = i / Ne;
      // Windowed so the wave eases to 0 near the caps
      const win  = Math.sin(f * Math.PI);
      const wave = tAmp * win * Math.sin(f * Math.PI * tCycles + tPhase);
      pts.push({ x: -hw + f * 2 * hw,  y: -r + wave });
    }

    // ── Right cap: top (−π/2) → bottom (+π/2)
    for (let i = 0; i < Nc; i++) {
      const a = -Math.PI / 2 + (i / Nc) * Math.PI;
      pts.push({ x: hw + Math.cos(a) * r,  y: Math.sin(a) * r });
    }

    // ── Bottom edge: right → left  (y = +r + wave)
    for (let i = 0; i < Ne; i++) {
      const f = i / Ne;
      const win  = Math.sin(f * Math.PI);
      const wave = bAmp * win * Math.sin(f * Math.PI * bCycles + bPhase);
      pts.push({ x: hw - f * 2 * hw,  y: r + wave });
    }

    // ── Left cap: bottom (+π/2) → top (+3π/2)
    for (let i = 0; i < Nc; i++) {
      const a = Math.PI / 2 + (i / Nc) * Math.PI;
      pts.push({ x: -hw + Math.cos(a) * r,  y: Math.sin(a) * r });
    }

    // ── Catmull-Rom → one smooth closed curve ──
    const n = pts.length;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i-1+n)%n], p1 = pts[i],
            p2 = pts[(i+1)  %n], p3 = pts[(i+2)%n];
      ctx.bezierCurveTo(
        p1.x+(p2.x-p0.x)/6, p1.y+(p2.y-p0.y)/6,
        p2.x-(p3.x-p1.x)/6, p2.y-(p3.y-p1.y)/6,
        p2.x, p2.y
      );
    }
    ctx.closePath();
  }

  /* ── Newspaper page background: subtle grain over transparent canvas ──
     No opaque fill — the page stays white (or shows a photo).
     Only a very light scatter of fibrous marks adds a paper-like feel
     without tinting or covering anything underneath.
  ── */
  function _renderNewspaperPageBg() {
    const page = document.getElementById('page');
    const pw   = page.offsetWidth  || 720;
    const ph   = page.offsetHeight || 720;
    const dpr  = devicePixelRatio;

    const canvas = document.createElement('canvas');
    canvas.width  = pw * dpr;
    canvas.height = ph * dpr;
    canvas.style.cssText = `width:${pw}px;height:${ph}px;display:block;`;
    bgLayer.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // No background fill — canvas is transparent so white page / photo shows through

    // Sparse fibrous grain — barely-there texture, just enough to feel like paper
    for (let i = 0; i < 5000; i++) {
      const gx = Math.random() * pw;
      const gy = Math.random() * ph;
      const gw = Math.random() * 1.2 + 0.2;
      const gh = gw * (Math.random() * 4 + 0.5);
      ctx.globalAlpha = 0.008 + Math.random() * 0.016;
      ctx.fillStyle   = '#4a3728';   // warm dark brown → feels like paper fibre
      ctx.fillRect(gx, gy, gw, gh);
    }
    ctx.globalAlpha = 1;
  }

  /* ════════════════════════════════
     MAIN RENDER
  ════════════════════════════════ */
  async function renderBg() {
    // Snap guide colour: dark on light backgrounds, light on dark
    const _sg = document.querySelectorAll('.snap-guide');
    const [sr,sg,sb] = hexToRgb(chipColor);
    const _bgLum = (0.299*sr + 0.587*sg + 0.114*sb) / 255;
    _sg.forEach(g => g.classList.toggle('dark', _bgLum > 0.55));

    bgLayer.innerHTML = '';
    const rawText  = bgInput.value.trim();
    if (!rawText) return;
    const opacity  = 0.92;
    const fontSize = parseInt(bgSize.value);
    if (mode === 'overlay') {
      renderOverlay(rawText, opacity, fontSize);
    } else if (chipStyle === 'postit') {
      await renderPostitNote(rawText, fontSize);
    } else if (chipStyle === 'newspaper') {
      _renderNewspaperPageBg();
      if (newspaperMode === 'line') {
        await renderNewspaper(rawText, fontSize);
      } else {
        await renderChips(rawText, opacity, fontSize);
      }
    } else {
      await renderChips(rawText, opacity, fontSize);
    }
  }

  /* ════════════════════════════════
     SINGLE POST-IT NOTE RENDER
     Draggable + resizable note drawn on its own canvas inside a positioned wrapper.
  ════════════════════════════════ */
  let postitCX    = null;
  let postitCY    = null;
  let postitScale = 1.0;
  let postitRot   = 0;   // degrees, user-controlled
  let _activeRotHandle = null;  // reference to current handle for show/hide

  async function renderPostitNote(text, fontSize) {
    try { await document.fonts.load(`700 ${fontSize}px Caveat`); } catch(e) {}

    const page = document.getElementById('page');
    const pw   = page.offsetWidth  || 720;
    const ph   = page.offsetHeight || 720;

    const baseNoteS = Math.min(pw * 0.60, ph * 0.64, 430);
    const noteS     = baseNoteS * postitScale;
    const hw = noteS / 2, ht = noteS / 2;

    const border    = noteS * (4.5  / 180);
    const headerH   = noteS * (33   / 180);
    const labelSize = noteS * (6.5  / 180);
    const padX      = noteS * (14   / 180);
    const padVert   = noteS * 0.055;
    const textW     = noteS - padX * 2;
    const contentH  = noteS - headerH - padVert * 2;

    const shadow = Math.round(noteS * 0.18);
    const pad = shadow;
    const cw = noteS + pad * 2, ch = noteS + pad * 2;
    const dpr = devicePixelRatio;

    const canvas = document.createElement('canvas');
    canvas.width = cw * dpr; canvas.height = ch * dpr;
    canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
    canvas.style.display = 'block';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Auto-fit font
    const words = text.split(/\s+/).filter(Boolean);
    let fitSize = Math.max(8, fontSize * postitScale), wLines = [], lineH = fitSize * 1.55;
    function wrapWords(ws, maxW) {
      const lines = []; let cur = '';
      for (const w of ws) {
        if (ctx.measureText(w).width > maxW) {
          if (cur) { lines.push(cur); cur = ''; }
          let chunk = '';
          for (const ch of w) {
            const probe = chunk + ch;
            if (ctx.measureText(probe).width > maxW && chunk) { lines.push(chunk); chunk = ch; }
            else chunk = probe;
          }
          cur = chunk;
        } else {
          const test = cur ? cur + ' ' + w : w;
          if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
          else cur = test;
        }
      }
      if (cur) lines.push(cur);
      return lines;
    }
    while (fitSize >= 7) {
      lineH = fitSize * 1.55; ctx.font = `700 ${fitSize}px Caveat`;
      wLines = wrapWords(words, textW);
      if (wLines.length * lineH <= contentH) break;
      fitSize--;
    }

    // Subtle seed-based jitter for hand-placed feel
    initRng(masterSeed);
    const rot = (rng() - 0.5) * 0.025;

    ctx.save();
    ctx.translate(pad + hw, pad + ht);
    ctx.rotate(rot);

    if (bgVisible.checked) {
      ctx.shadowColor = 'rgba(0,0,0,0.20)'; ctx.shadowBlur = 22;
      ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 8;
      ctx.globalAlpha = 0.97; ctx.fillStyle = chipColor;
      ctx.fillRect(-hw, -ht, noteS, noteS);
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

      ctx.globalAlpha = 0.30; ctx.strokeStyle = textColor;
      ctx.lineWidth = Math.max(0.8, noteS * 0.006);
      ctx.strokeRect(-hw + border, -ht + border, noteS - border*2, noteS - border*2);
    }

    const sepY = -ht + headerH;
    if (bgVisible.checked) {
      ctx.beginPath(); ctx.moveTo(-hw + padX, sepY); ctx.lineTo(hw - padX, sepY);
      ctx.strokeStyle = textColor; ctx.lineWidth = Math.max(0.6, noteS * 0.004);
      ctx.globalAlpha = 0.30; ctx.stroke();

      ctx.globalAlpha = 0.55; ctx.fillStyle = textColor;
      ctx.font = `700 ${Math.max(9, labelSize * 1.8)}px -apple-system,BlinkMacSystemFont,sans-serif`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText('NOTE', -hw + padX, -ht + headerH * 0.52);
    }

    const midContent = (sepY + padVert + ht - padVert) / 2;
    const textStartY = midContent - (wLines.length * lineH) / 2 + lineH / 2;
    ctx.globalAlpha = 1; ctx.fillStyle = textColor;
    ctx.font = `700 ${fitSize}px Caveat`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    wLines.forEach((l, i) => ctx.fillText(l, 0, textStartY + i * lineH));

    // ── Corner curl (top-left) ──
    if (bgVisible.checked) {
      const curlS = noteS * 0.12;
      ctx.save();
      // Shadow cast onto the note by the lifted corner
      const grad = ctx.createLinearGradient(-hw, -ht, -hw + curlS * 0.8, -ht + curlS * 0.8);
      grad.addColorStop(0, 'rgba(0,0,0,0.10)');
      grad.addColorStop(1, 'rgba(0,0,0,0.00)');
      ctx.beginPath();
      ctx.moveTo(-hw, -ht);
      ctx.lineTo(-hw + curlS, -ht);
      ctx.lineTo(-hw, -ht + curlS);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      // Curled face — lighter tint of chip color (the paper's back)
      ctx.shadowColor = 'rgba(0,0,0,0.22)';
      ctx.shadowBlur = 7; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
      ctx.beginPath();
      ctx.moveTo(-hw, -ht);
      ctx.lineTo(-hw + curlS, -ht);
      ctx.lineTo(-hw, -ht + curlS);
      ctx.closePath();
      ctx.fillStyle = blendWithWhite(chipColor, 0.55);
      ctx.fill();
      // Crease line
      ctx.shadowColor = 'transparent';
      ctx.beginPath();
      ctx.moveTo(-hw + curlS, -ht);
      ctx.lineTo(-hw, -ht + curlS);
      ctx.strokeStyle = 'rgba(0,0,0,0.16)';
      ctx.lineWidth = Math.max(0.6, noteS * 0.005);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();

    const cx = postitCX !== null ? postitCX : pw / 2;
    const cy = postitCY !== null ? postitCY : ph / 2;

    const wrapper = document.createElement('div');
    wrapper.style.cssText = `
      position:absolute; left:${cx - cw/2}px; top:${cy - ch/2}px;
      width:${cw}px; height:${ch}px;
      cursor:grab; user-select:none; touch-action:none; pointer-events:auto;
      transform:rotate(${postitRot}deg); transform-origin:center center;
    `;
    wrapper.appendChild(canvas);

    // Rotate handle — sits exactly at the visual top-right corner of the note
    const rotHandle = document.createElement('div');
    rotHandle.className = 'postit-rot-handle';
    rotHandle.textContent = '↻';
    // pad offsets the visual note inside the wrapper; place handle at the note's corner
    rotHandle.style.top   = (pad) + 'px';
    rotHandle.style.right = (pad) + 'px';
    wrapper.appendChild(rotHandle);
    _activeRotHandle = rotHandle;  // track for outside-tap hiding

    bgLayer.appendChild(wrapper);

    // ── Drag to move ──
    let dragging = false, dSX, dSY, dOL, dOT;
    let prevDragX = 0, dragVelX = 0;
    wrapper.addEventListener('pointerdown', e => {
      if (e.target === rotHandle) return;
      rotHandle.style.display = 'flex';
      dragging = true; dSX = e.clientX; dSY = e.clientY;
      prevDragX = e.clientX; dragVelX = 0;
      dOL = parseFloat(wrapper.style.left); dOT = parseFloat(wrapper.style.top);
      wrapper.setPointerCapture(e.pointerId);
      wrapper.style.cursor = 'grabbing';
      // Pick-up: lift slightly off the surface
      wrapper.style.transition = 'transform 0.12s ease-out, filter 0.12s ease-out';
      wrapper.style.filter = 'drop-shadow(0 14px 26px rgba(0,0,0,0.26))';
      wrapper.style.transform = `rotate(${postitRot}deg) scale(1.05)`;
    });
    wrapper.addEventListener('pointermove', e => {
      if (!dragging) return;
      dragVelX = e.clientX - prevDragX;
      prevDragX = e.clientX;
      const l = dOL + (e.clientX - dSX), t = dOT + (e.clientY - dSY);
      wrapper.style.left = l + 'px'; wrapper.style.top = t + 'px';
      postitCX = l + cw / 2; postitCY = t + ch / 2;
      // Tilt based on lateral velocity — feels like paper swaying
      const tilt = Math.max(-7, Math.min(7, dragVelX * 0.5));
      wrapper.style.transition = 'none';
      wrapper.style.transform = `rotate(${postitRot + tilt}deg) scale(1.05)`;
    });
    wrapper.addEventListener('pointerup', () => {
      dragging = false; wrapper.style.cursor = 'grab';
      // Drop: spring back with a slight bounce
      wrapper.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.25s ease-out';
      wrapper.style.filter = '';
      wrapper.style.transform = `rotate(${postitRot}deg) scale(1)`;
    });
    wrapper.addEventListener('pointercancel', () => {
      dragging = false; wrapper.style.cursor = 'grab';
      wrapper.style.transition = 'transform 0.3s ease-out, filter 0.2s ease-out';
      wrapper.style.filter = '';
      wrapper.style.transform = `rotate(${postitRot}deg) scale(1)`;
    });

    // ── Drag handle: rotate + scale ──
    let gesturing = false, gStartAngle, gStartRot, gStartDist, gStartScale;

    function getCenterAndAngle(e) {
      const rect = wrapper.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * (180 / Math.PI);
      const dist  = Math.hypot(e.clientX - cx, e.clientY - cy);
      return { angle, dist };
    }

    rotHandle.addEventListener('pointerdown', e => {
      e.stopPropagation();
      gesturing = true;
      const { angle, dist } = getCenterAndAngle(e);
      gStartAngle = angle;
      gStartRot   = postitRot;
      gStartDist  = dist || 1;
      gStartScale = postitScale;
      rotHandle.setPointerCapture(e.pointerId);
      rotHandle.style.cursor = 'grabbing';
    });

    rotHandle.addEventListener('pointermove', e => {
      if (!gesturing) return;
      const { angle, dist } = getCenterAndAngle(e);
      const newRot   = gStartRot + (angle - gStartAngle);
      const newScale = Math.max(0.20, Math.min(3.0, gStartScale * (dist / gStartDist)));
      postitRot   = newRot;
      postitScale = newScale;
      wrapper.style.transform = `rotate(${newRot}deg) scale(${newScale / gStartScale})`;
    });

    rotHandle.addEventListener('pointerup', () => {
      gesturing = false;
      rotHandle.style.cursor = 'grab';
      postitRot = ((postitRot % 360) + 540) % 360 - 180;
      // Re-bake canvas at new scale, reset CSS scale to 1
      renderBg();
    });

    rotHandle.addEventListener('pointercancel', () => {
      gesturing = false;
      renderBg();
    });
  }

  function renderOverlay(text, opacity, fontSize) {
    const sp = document.createElement('div');
    Object.assign(sp.style, {
      position: 'absolute', inset: '0',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: "'Caveat',cursive", fontWeight: '800',
      fontSize: 'clamp(48px,10vw,110px)',
      textAlign: 'center', lineHeight: '1', letterSpacing: '-2px',
      color: chipColor, opacity, padding: '24px', wordBreak: 'break-word',
      pointerEvents: 'none',
      transform: (bgOffsetX !== 0 || bgOffsetY !== 0) ? `translateX(${bgOffsetX}%) translateY(${bgOffsetY}%)` : '',
    });
    sp.textContent = text;
    bgLayer.appendChild(sp);
  }

  /* ════════════════════════════════════════════════════════════════
     NEWSPAPER / TORN-PAPER RENDER
     Each input line → one beige kraft strip, slightly misaligned.
     Per-strip: horizontal jitter + tiny rotation + torn wavy edges
     + paper grain texture, giving a handmade scrapbook collage feel.
     RNG per strip: 1 (jitX) + 1 (rot) + 8 (drawNewspaper) = 10 calls.
  ════════════════════════════════════════════════════════════════ */
  async function renderNewspaper(text, fontSize) {
    const NP_FONT = `400 ${fontSize}px "Times New Roman", Georgia, serif`;
    try { await document.fonts.load(NP_FONT); } catch(e) {}

    const page = document.getElementById('page');
    const pw   = page.offsetWidth  || 720;
    const ph   = page.offsetHeight || 720;
    const dpr  = devicePixelRatio;

    // ── Measure + wrap long lines ──
    const mc   = document.createElement('canvas');
    const mCtx = mc.getContext('2d');
    mCtx.font  = NP_FONT;
    const maxW = (pw - 40) * Math.min(lineWidthPct / 100, 0.84);

    const lines = [];
    text.split(/\n/).forEach(seg => {
      const words = seg.trim().split(/\s+/).filter(Boolean);
      if (!words.length) return;
      let cur = '';
      words.forEach(w => {
        const test = cur ? cur + ' ' + w : w;
        if (mCtx.measureText(test).width > maxW && cur) {
          lines.push(cur); cur = w;
        } else { cur = test; }
      });
      if (cur) lines.push(cur);
    });
    if (!lines.length) return;

    // ── Layout ──
    const stripH = Math.round(fontSize * 1.30);
    const gapV   = Math.round(fontSize * 0.52);
    const blockH = lines.length * (stripH + gapV) - gapV;
    let   yBase  = (ph - blockH) / 2 + bgOffsetY / 100 * ph;
    yBase = Math.max(stripH * 0.6, yBase);

    initRng(masterSeed + text.split('').reduce((a, c) => a + c.charCodeAt(0), 0));

    // ── Single shared canvas ──
    const canvas = document.createElement('canvas');
    canvas.width  = pw * dpr;
    canvas.height = ph * dpr;
    canvas.style.cssText = `width:${pw}px;height:${ph}px;display:block;`;
    bgLayer.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Gap width: wide enough to clear the strip padding (hw extends fontSize*0.42 each side)
    const gapW = Math.max(mCtx.measureText(' ').width * 1.5, fontSize * 1.0);

    lines.forEach((line, li) => {
      // ── Split line into segments using the same gap rule as renderChips ──
      const words = line.split(' ');
      const segs  = [];   // [{text, isGap}]
      let   cur   = '';
      words.forEach((word, wi) => {
        if (wi > 0 && shouldHlGap(words[wi - 1], wi, li)) {
          if (cur) segs.push({ text: cur, isGap: false });
          segs.push({ text: '', isGap: true });
          cur = word;
        } else {
          cur = cur ? cur + ' ' + word : word;
        }
      });
      if (cur) segs.push({ text: cur, isGap: false });

      // Measure each segment
      const segTWs = segs.map(s => s.isGap ? 0 : mCtx.measureText(s.text).width);
      const segCWs = segs.map((s, i) => s.isGap ? gapW : segTWs[i]);
      const totalW = segCWs.reduce((a, b) => a + b, 0);

      // Per-line jitter: ±13% page width + slight tilt (shared across all segments)
      const maxOff = Math.min(pw * 0.13, fontSize * 4.5);
      const jitX   = (rng() - 0.5) * 2 * maxOff;          // 1 rng
      const rot    = (rng() - 0.5) * 0.040;                // 1 rng
      const cy     = yBase + li * (stripH + gapV) + stripH / 2;
      let   curX   = pw / 2 - totalW / 2 + jitX + bgOffsetX / 100 * pw;

      segs.forEach((seg, si) => {
        const cw = segCWs[si];
        const tw = segTWs[si];
        const cx = curX + cw / 2;
        curX += cw;

        if (seg.isGap) return;   // transparent gap — nothing to draw

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rot);

        // 1 — drop shadow
        ctx.shadowColor = 'rgba(0,0,0,0.20)';
        ctx.shadowBlur  = 13; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 5;

        // 2 — torn strip path (8 rng calls)
        drawNewspaper(ctx, tw, fontSize);
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

        // 3 — base paper fill (full opacity)
        ctx.globalAlpha = 1; ctx.fillStyle = chipColor; ctx.fill();

        // 4 — paper grain (clip to strip; path still active after fill)
        ctx.save();
        ctx.clip();
        const gW = tw + fontSize * 0.9, gH = fontSize * 1.3;
        for (let i = 0; i < 300; i++) {
          const gx = (Math.random() - 0.5) * gW;
          const gy = (Math.random() - 0.5) * gH;
          const gw = Math.random() * 1.6 + 0.2;
          const gh = gw * (Math.random() * 3.2 + 0.5);
          ctx.globalAlpha = 0.018 + Math.random() * 0.052;
          ctx.fillStyle   = Math.random() > 0.42 ? '#000' : '#fff';
          ctx.fillRect(gx, gy, gw, gh);
        }
        ctx.restore();
        ctx.globalAlpha = 1;

        // 5 — text
        ctx.fillStyle = textColor;
        ctx.font      = NP_FONT;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(seg.text, 0, 0);

        ctx.restore();
      });
    });
  }

  /* ── Highlight gap helper ──
     Decides (deterministically, no rng() calls) whether to place a
     transparent gap BEFORE word at position `wordIdx` in line `lineIdx`.
     Probabilities vary by context so gaps cluster naturally at
     punctuation and conjunctions, with occasional random breaks elsewhere.
  ── */
  function shouldHlGap(prevWord, wordIdx, lineIdx) {
    const CONJ = new Set(['and','or','but','so','yet','nor','for','then','when','while','because','although']);
    // Stable hash mixes content + position + current shuffle seed
    const h = Math.abs((prevWord.length * 13 + wordIdx * 37 + lineIdx * 79 + masterSeed) | 0) % 100;
    const bare = prevWord.toLowerCase().replace(/[^a-z]/g, '');
    if (/[\.!?;]$/.test(prevWord)) return h < 78;   // after sentence end  ~78%
    if (/,$/.test(prevWord))        return h < 62;   // after comma         ~62%
    if (CONJ.has(bare))             return h < 48;   // at conjunction      ~48%
    return h < 5;                                    // random elsewhere     ~5%
  }

  async function renderChips(text, opacity, fontSize, exportCtx = null) {
    try { await document.fonts.load(`700 ${fontSize}px Caveat`); } catch(e) {}

    const page = document.getElementById('page');
    const pw   = page.offsetWidth  || 720;
    const ph   = page.offsetHeight || 480;

    // ── Measuring context (used for text width only) ──
    const measureCanvas = document.createElement('canvas');
    const mCtx = measureCanvas.getContext('2d');
    mCtx.font = (chipStyle === 'newspaper' || chipStyle === 'highlight')
      ? `400 ${fontSize}px "Times New Roman", Georgia, serif`
      : `700 ${fontSize}px Caveat`;

    /* Words flow left-to-right, wrap to next row only when line is full.
       Manual newlines in the input always force a new chip row. */
    const chipGapEst = chipStyle === 'newspaper' ? Math.round(fontSize * 0.50) : Math.round(fontSize * 0.20);
    const capEst     = fontSize * 0.615 * 2;
    const padXEst    = 0;
    const maxLineW   = (pw - 40) * (lineWidthPct / 100);

    const lines = [];
    if (newspaperMode === 'line') {
      // ── Line mode: whole sentence → one chip, wrapping at maxLineW ──
      const spW = mCtx.measureText(' ').width;
      text.split(/\n/).forEach(segment => {
        const words = segment.trim().split(/\s+/).filter(Boolean);
        if (!words.length) return;
        let cur = [], curW = 0;
        words.forEach(w => {
          const ww = mCtx.measureText(w).width;
          const gap = cur.length ? spW : 0;
          if (cur.length && curW + gap + ww > maxLineW) {
            lines.push([cur.join(' ')]); cur = [w]; curW = ww;
          } else { cur.push(w); curW += gap + ww; }
        });
        if (cur.length) lines.push([cur.join(' ')]);
      });
    } else {
      // ── Word mode: each word is its own chip (original behaviour) ──
      text.split(/\n/).forEach(segment => {
        const segWords = segment.split(/\s+/).filter(Boolean);
        if (segWords.length === 0) return;
        let line = [], lineW = 0;
        segWords.forEach(w => {
          const ww   = mCtx.measureText(w).width + padXEst + capEst;
          const addW = line.length === 0 ? ww : chipGapEst + ww;
          if (line.length > 0 && lineW + addW > maxLineW) {
            lines.push([...line]); line = []; lineW = 0;
          }
          line.push(w);
          lineW += (line.length === 1 ? 0 : chipGapEst) + ww;
        });
        if (line.length) lines.push(line);
      });
    }

    // ── Highlight line mode: randomly split lines into segments + transparent gaps ──
    // '\x00' (null char) is used as a gap-marker word — takes space, draws nothing.
    if ((chipStyle === 'highlight' || chipStyle === 'newspaper' || chipStyle === 'rounded') && newspaperMode === 'line') {
      const spaceW = mCtx.measureText(' ').width;
      for (let li = 0; li < lines.length; li++) {
        const fullText = lines[li][0];
        const words = fullText.split(' ');
        if (words.length <= 1) continue;
        const segmented = [];
        let cur = '';
        words.forEach((word, wi) => {
          if (wi > 0 && shouldHlGap(words[wi - 1], wi, li)) {
            if (cur) segmented.push(cur);
            segmented.push('\x00');          // transparent gap
            cur = word;
          } else {
            cur = cur ? cur + ' ' + word : word;
          }
        });
        if (cur) segmented.push(cur);
        if (segmented.length > 1) lines[li] = segmented;
      }
    }

    const chipH  = chipStyle === 'highlight'     ? Math.round(fontSize * 0.90)
                 : chipStyle === 'postit'        ? Math.round(fontSize * 1.40)
                 : chipStyle === 'newspaper'     ? Math.round(fontSize * 1.20)
                 : chipStyle === 'selectionbar'  ? Math.round(fontSize * 1.40)
                 :                                Math.round(fontSize * 1.25);
    const gapV   = chipStyle === 'highlight'     ? Math.round(chipH * 0.20)
                 : chipStyle === 'postit'        ? Math.round(chipH * 0.38)
                 : chipStyle === 'newspaper'     ? Math.round(chipH * 0.22)
                 : chipStyle === 'selectionbar'  ? Math.round(chipH * 0.28)
                 :                                Math.round(chipH * 0.30);
    const blockH = lines.length * (chipH + gapV) - gapV;
    let   yBase  = (ph - blockH) / 2 + bgOffsetY / 100 * ph;
    yBase = Math.max(chipH * 0.5, yBase);

    initRng(masterSeed + text.split('').reduce((a,c) => a + c.charCodeAt(0), 0));

    const tc = getTextColor();

    // ── Phase 1: Collect all chip geometry + save RNG state before each draw ──
    const allChips = [];
    lines.forEach((lineWords, li) => {
      const chipGap    = chipStyle === 'newspaper' ? Math.round(fontSize * 0.50) : Math.round(fontSize * 0.20);
      const textWidths = lineWords.map(w => mCtx.measureText(w).width);
      const padXArr    = lineWords.map(() => 0);
      const padYArr    = lineWords.map(() => fontSize * (0.08 + rng() * 0.07));
      const rArr       = padYArr.map(pY => fontSize / 2 + pY);
      const spW        = mCtx.measureText(' ').width;
      const chipWidths = textWidths.map((tw, i) =>
        lineWords[i] === '\x00'      ? spW * 1.4              // transparent gap spacer
        : chipStyle === 'highlight'    ? tw + fontSize * 0.20
        : chipStyle === 'postit'     ? tw + fontSize * 0.68
        : chipStyle === 'newspaper'  ? tw + fontSize * 0.86
        : chipStyle === 'selectionbar' ? tw + fontSize * 0.40
        :                              tw + 2 * padXArr[i] + 2 * rArr[i]
      );
      const totalLineW = chipWidths.reduce((a,b) => a+b, 0) + chipGap*(lineWords.length-1);
      let curX = (pw - totalLineW) / 2 + bgOffsetX / 100 * pw;
      const rowY   = yBase + li * (chipH + gapV);
      const rowJitY = rngSigned() * chipH * 0.18;

      lineWords.forEach((word, wi) => {
        const cw   = chipWidths[wi];
        const tw   = textWidths[wi];
        const jitY = rowJitY + rngSigned() * chipH * 0.06;
        const rot  = chipStyle === 'highlight'    ? rngSigned() * 0.032
                   : chipStyle === 'postit'       ? rngSigned() * 0.130
                   : chipStyle === 'newspaper'    ? rngSigned() * 0.088
                   : chipStyle === 'selectionbar' ? rngSigned() * 0.012
                   :                               rngSigned() * 0.105;
        const cx = curX + cw / 2;
        const cy = rowY + chipH / 2 + jitY;

        const wordIndex = lines.slice(0, li).reduce((s, l) => s + l.length, 0) + wi;
        const palIdx    = (wordIndex + paletteOffset) % palette.length;
        const wChip     = multiColor ? palette[palIdx][0] : chipColor;
        const wText     = multiColor ? palette[palIdx][1] : tc;
        const wHex      = wChip.replace('#', '');
        const [wr,wg,wb]= [0,2,4].map(i => parseInt(wHex.slice(i,i+2),16)/255);
        const wLuma     = 0.299*wr + 0.587*wg + 0.114*wb;

        // Save RNG state just before the draw function consumes it
        const preDrawRng = _s;

        // Advance RNG past the draw function's internal calls
        if      (chipStyle === 'highlight')    { for (let _=0; _<42; _++) rng(); }
        else if (chipStyle === 'postit')       { for (let _=0; _<5;  _++) rng(); }
        else if (chipStyle === 'newspaper')    { for (let _=0; _<8;  _++) rng(); }
        else if (chipStyle === 'selectionbar') { /* 0 rng calls */ }
        else                                   { for (let _=0; _<6;  _++) rng(); }

        allChips.push({ cx, cy, cw, tw, rot, padX: padXArr[wi], padY: padYArr[wi],
                        word, wChip, wText, wLuma, preDrawRng,
                        isGap: word === '\x00' });
        curX += cw + chipGap;
      });
    });

    // ── Shared inner draw helper (ctx already translated to chip center) ──
    function _drawChip(ctx, chip) {
      if (chip.isGap) return;          // transparent gap — occupies space, draws nothing
      _s = chip.preDrawRng;
      ctx.rotate(chip.rot);

      if (bgVisible.checked) {
        if (chipStyle === 'highlight') {
          ctx.shadowColor = 'rgba(0,0,0,0.06)'; ctx.shadowBlur = 4;
          ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1;
          drawHighlight(ctx, chip.tw, fontSize, chip.wChip);
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

        } else if (chipStyle === 'postit') {
          ctx.shadowColor = 'rgba(0,0,0,0.20)'; ctx.shadowBlur = 9;
          ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 5;
          drawPostit(ctx, chip.tw, fontSize, chip.wChip);
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

        } else if (chipStyle === 'newspaper') {
          ctx.shadowColor = 'rgba(0,0,0,0.28)'; ctx.shadowBlur = 11;
          ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 5;
          drawNewspaper(ctx, chip.tw, fontSize);
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
          // Paper fill (full opacity — no transparency)
          ctx.globalAlpha = 1; ctx.fillStyle = chip.wChip; ctx.fill();
          // Paper grain — tiny fibre-like marks clipped to the strip shape
          ctx.save();
          ctx.clip();
          const grainW = chip.tw + fontSize * 0.9;
          const grainH = fontSize * 1.2;
          for (let i = 0; i < 260; i++) {
            const gx = (Math.random() - 0.5) * grainW;
            const gy = (Math.random() - 0.5) * grainH;
            const gw = Math.random() * 1.5 + 0.2;
            const gh = gw * (Math.random() * 3 + 0.6);
            ctx.globalAlpha = 0.022 + Math.random() * 0.048;
            ctx.fillStyle   = Math.random() > 0.42 ? '#000' : '#fff';
            ctx.fillRect(gx, gy, gw, gh);
          }
          ctx.restore();
          ctx.globalAlpha = 1;

        } else if (chipStyle === 'selectionbar') {
          drawSelectionBar(ctx, chip.tw, fontSize, chip.wChip, chip.wText);

        } else {
          ctx.shadowColor = 'rgba(0,0,0,0.13)'; ctx.shadowBlur = 5;
          ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 2;
          drawOrganicBlob(ctx, chip.tw, fontSize, chip.padX, chip.padY, chip.word.length);
          ctx.globalAlpha = opacity; ctx.fillStyle = chip.wChip; ctx.fill();
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
          if (chip.wLuma > 0.55) {
            ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1; ctx.stroke();
          }
        }
      }

      ctx.globalAlpha = 1; ctx.fillStyle = chip.wText;
      ctx.font = (chipStyle === 'newspaper' || chipStyle === 'highlight')
        ? `400 ${fontSize}px "Times New Roman", Georgia, serif`
        : `700 ${fontSize}px Caveat`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(chip.word, 0, 1);
    }

    // ── Helper: build a positioned mini canvas for one chip ──
    function _makeMiniCanvas(chip, animPad) {
      const dpr   = devicePixelRatio;
      const miniW = Math.ceil(chip.cw) + animPad * 2;
      const miniH = chipH + animPad * 2;
      const mc    = document.createElement('canvas');
      mc.width  = miniW * dpr;
      mc.height = miniH * dpr;
      mc.style.cssText = `width:${miniW}px;height:${miniH}px;display:block;`;
      const mCtx2 = mc.getContext('2d');
      mCtx2.scale(dpr, dpr);
      mCtx2.save();
      mCtx2.translate(miniW / 2, miniH / 2);
      _drawChip(mCtx2, chip);
      mCtx2.restore();
      return { mc, miniW, miniH };
    }

    // ── Phase 2a: Static — one shared canvas (or direct to exportCtx for hi-res export) ──
    if (animMode === 'off' || exportCtx) {
      let renderCtx;
      if (exportCtx) {
        // High-res export: draw directly onto the pre-scaled export canvas.
        // All shape + text drawing uses logical coordinates, so it renders
        // at whatever DPI exportCtx has been scaled to (e.g. 4K).
        renderCtx = exportCtx;
      } else {
        const canvas = document.createElement('canvas');
        canvas.width  = pw * devicePixelRatio;
        canvas.height = ph * devicePixelRatio;
        canvas.style.width  = pw + 'px';
        canvas.style.height = ph + 'px';
        bgLayer.appendChild(canvas);
        renderCtx = canvas.getContext('2d');
        renderCtx.scale(devicePixelRatio, devicePixelRatio);
      }
      allChips.forEach(chip => {
        renderCtx.save();
        renderCtx.translate(chip.cx, chip.cy);
        _drawChip(renderCtx, chip);
        renderCtx.restore();
      });

    // ── Phase 2b: Bounce — slide in from left, word by word ──
    } else if (animMode === 'bounce') {
      _applyIntensityKeyframes();
      const t       = animIntensity / 100;
      const cbY2    = (1.0 + 1.2 * t).toFixed(3);  // overshoot: 1.0 (subtle) → 2.2 (heavy)
      const animPad = Math.ceil(fontSize * 0.9);
      allChips.forEach((chip, idx) => {
        const { mc, miniW, miniH } = _makeMiniCanvas(chip, animPad);
        const wrapper = document.createElement('div');
        wrapper.style.cssText = [
          'position:absolute',
          `left:${chip.cx - miniW / 2}px`,
          `top:${chip.cy - miniH / 2}px`,
          `width:${miniW}px`, `height:${miniH}px`,
          'pointer-events:none',
          `animation:chipBounceIn 0.45s cubic-bezier(0.34,${cbY2},0.64,1) both`,
          `animation-delay:${idx * 65}ms`,
        ].join(';');
        wrapper.appendChild(mc);
        bgLayer.appendChild(wrapper);
      });

    // ── Phase 2c: Sparkle — pop + scatter star particles ──
    } else if (animMode === 'sparkle') {
      _applyIntensityKeyframes();
      const t         = animIntensity / 100;
      const cbY2      = (1.0 + 1.2 * t).toFixed(3);
      // particle scatter: 0.4× (subtle) → 1.0× (default@50) → 2.0× (heavy)
      const sparkMult = 0.4 + 1.2 * t;
      const animPad   = Math.ceil(fontSize * 0.9);
      const sparkDist = Math.max(fontSize * 1.1, chipH * 0.85) * sparkMult;
      // 8 evenly-spaced directions for particles
      const ANGLES    = [0, 45, 90, 135, 180, 225, 270, 315];

      allChips.forEach((chip, idx) => {
        const { mc, miniW, miniH } = _makeMiniCanvas(chip, animPad);
        const wrapper = document.createElement('div');
        wrapper.style.cssText = [
          'position:absolute',
          `left:${chip.cx - miniW / 2}px`,
          `top:${chip.cy - miniH / 2}px`,
          `width:${miniW}px`, `height:${miniH}px`,
          'pointer-events:none', 'overflow:visible',
          `animation:chipSparkleIn 0.48s cubic-bezier(0.34,${cbY2},0.64,1) both`,
          `animation-delay:${idx * 60}ms`,
        ].join(';');
        wrapper.appendChild(mc);

        // Star particles — alternate chip and text color
        const particleColors = [chip.wText, chip.wChip, '#fff', chip.wText, chip.wChip, '#fff', chip.wText, chip.wChip];
        ANGLES.forEach((deg, pi) => {
          const rad = deg * Math.PI / 180;
          const pdx = Math.round(Math.cos(rad) * sparkDist);
          const pdy = Math.round(Math.sin(rad) * sparkDist);
          const sz  = 3 + (pi % 3);   // 3, 4 or 5 px
          const p   = document.createElement('div');
          p.style.cssText = [
            'position:absolute',
            `left:calc(50% - ${sz / 2}px)`,
            `top:calc(50% - ${sz / 2}px)`,
            `width:${sz}px`, `height:${sz}px`,
            'border-radius:50%',
            `background:${particleColors[pi]}`,
            'pointer-events:none',
            `--pdx:${pdx}px`, `--pdy:${pdy}px`,
            'animation:starParticle 0.62s ease-out both',
            `animation-delay:${idx * 60 + 140}ms`,
          ].join(';');
          wrapper.appendChild(p);
        });

        bgLayer.appendChild(wrapper);
      });

    // ── Phase 2d: Typing — chips reveal left-to-right, one word at a time ──
    } else if (animMode === 'typing') {
      const animPad  = Math.ceil(fontSize * 0.9);
      // intensity 1→100: subtle (fast reveal) → heavy (slow, dramatic reveal)
      const t        = animIntensity / 100;
      const CHAR_MS  = Math.round(20 + 80  * t);  // 20 ms → 100 ms per char  (default@50 → 60)
      const MIN_MS   = Math.round(80 + 160 * t);  // 80 ms → 240 ms min       (default@50 → 160)
      let   typeDelay = 0;

      allChips.forEach((chip) => {
        const { mc, miniW, miniH } = _makeMiniCanvas(chip, animPad);
        const typeMs = Math.max(MIN_MS, chip.word.length * CHAR_MS);

        const wrapper = document.createElement('div');
        wrapper.style.cssText = [
          'position:absolute',
          `left:${chip.cx - miniW / 2}px`,
          `top:${chip.cy - miniH / 2}px`,
          `width:${miniW}px`, `height:${miniH}px`,
          'pointer-events:none',
          `animation:chipReveal ${typeMs}ms linear both`,
          `animation-delay:${typeDelay}ms`,
        ].join(';');

        typeDelay += typeMs;   // next chip starts when this one finishes
        wrapper.appendChild(mc);
        bgLayer.appendChild(wrapper);
      });
    }
  }


  function clearEditor() {
    if (confirm('Clear all content?')) { editor.value = ''; updateCount(); }
  }

  function copyAll() {
    const btn = document.querySelector('.btn-ghost');
    navigator.clipboard.writeText(editor.value)
      .then(() => { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); });
  }

  function downloadTxt() {

  /* ── Export PNG (status bar button — supports transparent bg) ── */
  async function exportPng() {
    const page      = document.getElementById('page');
    const pw        = page.offsetWidth;
    const ph        = page.offsetHeight;
    const dpr       = Math.max(devicePixelRatio, 2);
    const transpBg  = document.getElementById('transparentBgToggle').checked;

    const canvas  = document.createElement('canvas');
    canvas.width  = pw * dpr;
    canvas.height = ph * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // Rounded-corner clip (matches .page border-radius: 16px)
    const rad = 16;
    ctx.beginPath();
    ctx.moveTo(rad, 0);
    ctx.lineTo(pw - rad, 0); ctx.quadraticCurveTo(pw, 0,  pw, rad);
    ctx.lineTo(pw, ph - rad); ctx.quadraticCurveTo(pw, ph, pw - rad, ph);
    ctx.lineTo(rad, ph);      ctx.quadraticCurveTo(0,  ph, 0,  ph - rad);
    ctx.lineTo(0, rad);       ctx.quadraticCurveTo(0,  0,  rad, 0);
    ctx.closePath();
    ctx.clip();

    if (!transpBg) { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, pw, ph); }

    const bgImage = document.getElementById('photoBg').style.backgroundImage;
    if (bgImage && bgImage !== 'none') {
      const url = bgImage.replace(/^url\(["']?|["']?\)$/g, '');
      await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.max(pw / img.width, ph / img.height);
          const sw = img.width * scale, sh = img.height * scale;
          ctx.drawImage(img, (pw - sw) / 2, (ph - sh) / 2, sw, sh);
          resolve();
        };
        img.onerror = resolve;
        img.src = url;
      });
    }

    const pageRect = page.getBoundingClientRect();
    bgLayer.querySelectorAll('canvas').forEach(c => {
      const r = c.getBoundingClientRect();
      ctx.drawImage(c, r.left - pageRect.left, r.top - pageRect.top, r.width, r.height);
    });

    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'text-art.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }, 'image/png');
  }
